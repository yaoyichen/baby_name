<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>古诗文起名 · 分析台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F4EFE4;--sidebar:#EDE7D9;--card:#FDFAF4;--card-hov:#FFF8EE;
  --ink:#241E12;--ink2:#5C5242;--ink3:#9B8F7E;
  --green:#3D6B4A;--green-l:#EBF2EC;--gold:#B8924A;--border:#DDD5C4;
  --shadow:0 1px 4px rgba(36,30,18,.08),0 4px 16px rgba(36,30,18,.05);
  --wx-金:#B8924A;--wx-金-bg:#FBF3E4;
  --wx-木:#3D6B4A;--wx-木-bg:#EBF2EC;
  --wx-火:#B84A3A;--wx-火-bg:#FAECEB;
  --wx-水:#3A5F8B;--wx-水-bg:#E6EDF5;
  --wx-土:#7A5C3A;--wx-土-bg:#F2EBDF;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans SC','PingFang SC',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;flex-direction:column}

/* ── 顶栏 ── */
header{background:var(--card);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:200;box-shadow:0 1px 8px rgba(36,30,18,.06)}
.logo{font-family:'Noto Serif SC',serif;font-size:17px;font-weight:600;color:var(--green);white-space:nowrap}
.logo span{color:var(--gold)}
.header-tabs{display:flex;gap:2px;background:var(--bg);border-radius:8px;padding:3px}
.htab{padding:4px 14px;border-radius:6px;font-size:13px;cursor:pointer;color:var(--ink2);transition:all .18s;white-space:nowrap;border:none;background:transparent}
.htab.active{background:var(--card);color:var(--ink);font-weight:500;box-shadow:0 1px 4px rgba(36,30,18,.1)}
.fav-count{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;background:var(--gold);color:#fff;border-radius:50%;font-size:10px;font-weight:600;margin-left:4px;vertical-align:middle}
.fav-count:empty{display:none}
header .sep{flex:1}
.stat-pill{font-size:12px;color:var(--ink3);background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:3px 12px;white-space:nowrap}

/* ── 布局 ── */
.layout{display:flex;flex:1;overflow:hidden;height:calc(100vh - 52px)}

/* ── 侧边栏 ── */
aside{width:248px;min-width:248px;background:var(--sidebar);border-right:1px solid var(--border);overflow-y:auto;padding:16px 14px 40px;display:flex;flex-direction:column;gap:16px}
.filter-section{display:flex;flex-direction:column;gap:10px}
.section-title{font-size:12px;font-weight:600;letter-spacing:.06em;color:var(--green);padding:4px 8px;background:var(--green-l);border-radius:6px;text-align:center}
.filter-group{display:flex;flex-direction:column;gap:6px}
.filter-label{font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3)}
.surname-input{width:100%;height:36px;padding:0 10px;border:1px solid var(--border);border-radius:8px;background:var(--card);font-family:'Noto Serif SC',serif;font-size:18px;font-weight:600;color:var(--ink);text-align:center;letter-spacing:.1em;outline:none;transition:border-color .2s}
.surname-input:focus{border-color:var(--green)}
.search-input{width:100%;height:32px;padding:0 10px;border:1px solid var(--border);border-radius:8px;background:var(--card);font-size:13px;color:var(--ink);outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--green)}
.search-input::placeholder{color:var(--ink3)}
.chip-group{display:flex;flex-wrap:wrap;gap:5px}
.chip{cursor:pointer;border:1.5px solid var(--border);border-radius:16px;padding:2px 10px;font-size:12px;background:var(--card);color:var(--ink2);transition:all .18s;user-select:none}
.chip.active{background:var(--chip-active-bg,var(--green));border-color:var(--chip-active-border,var(--green));color:#fff}
.chip[data-wx="金"].active{background:var(--wx-金);border-color:var(--wx-金)}
.chip[data-wx="木"].active{background:var(--wx-木);border-color:var(--wx-木)}
.chip[data-wx="火"].active{background:var(--wx-火);border-color:var(--wx-火)}
.chip[data-wx="水"].active{background:var(--wx-水);border-color:var(--wx-水)}
.chip[data-wx="土"].active{background:var(--wx-土);border-color:var(--wx-土)}
.stroke-row{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ink2)}
.stroke-row input[type=range]{flex:1;accent-color:var(--green);height:4px}
.stroke-val{min-width:20px;text-align:center;font-size:11px;color:var(--ink);font-weight:500}
.divider{border:none;border-top:1px solid var(--border);margin:2px 0}
.reset-btn{width:100%;height:34px;background:transparent;border:1.5px solid var(--border);border-radius:8px;font-size:12px;color:var(--ink2);cursor:pointer;transition:all .2s}
.reset-btn:hover{border-color:var(--green);color:var(--green)}
.radio-group{display:flex;flex-direction:column;gap:5px}
.radio-opt{display:flex;align-items:center;gap:7px;font-size:12px;cursor:pointer;color:var(--ink2)}
.radio-opt input{accent-color:var(--green)}

/* ── 主区 ── */
main{flex:1;overflow-y:auto;padding:18px 22px 48px;display:flex;flex-direction:column;gap:14px}

.combo-bar{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.combo-tag{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500;white-space:nowrap}
.combo-tag.ze{background:var(--wx-火-bg);color:var(--wx-火)}
.combo-tag.ping{background:var(--wx-水-bg);color:var(--wx-水)}
.combo-count{font-size:13px;color:var(--ink2)}
.combo-count strong{font-size:15px;color:var(--ink);font-family:'Noto Serif SC',serif}

.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.result-info{font-size:12px;color:var(--ink3)}
.toolbar-sep{flex:1}

/* 名字卡片 */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(268px,1fr));gap:12px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 14px 12px;display:flex;flex-direction:column;gap:10px;box-shadow:var(--shadow);transition:transform .18s,box-shadow .18s;position:relative}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(36,30,18,.12);background:var(--card-hov)}
.fav-btn{position:absolute;top:12px;right:12px;background:none;border:none;font-size:18px;cursor:pointer;padding:2px;line-height:1;opacity:.5;transition:opacity .2s,transform .2s}
.fav-btn:hover{opacity:1;transform:scale(1.2)}
.fav-btn.saved{opacity:1;color:var(--gold)}
.name-row{display:flex;align-items:baseline;padding-right:28px}
.name-surname{font-family:'Noto Serif SC',serif;font-size:26px;font-weight:300;color:var(--ink3)}
.name-chars{font-family:'Noto Serif SC',serif;font-size:30px;font-weight:600;color:var(--ink);letter-spacing:.08em}
.name-py{margin-left:auto;font-size:11px;color:var(--ink3);line-height:1.6;text-align:right}
.attrs{display:flex;gap:7px;flex-wrap:wrap}
.attr-card{flex:1;min-width:96px;border-radius:8px;padding:6px 9px;display:flex;flex-direction:column;gap:3px}
.attr-char{font-family:'Noto Serif SC',serif;font-size:16px;font-weight:600}
.attr-detail{font-size:11px;display:flex;gap:5px;flex-wrap:wrap}
.wx-badge{font-size:10px;font-weight:600;padding:1px 5px;border-radius:4px}
.tone-badge,.stroke-badge,.open-badge{font-size:10px;color:var(--ink3)}
.poem-block{border-top:1px solid var(--border);padding-top:8px;display:flex;flex-direction:column;gap:3px}
.poem-sent{font-family:'Noto Serif SC',serif;font-size:13px;color:var(--ink2);line-height:1.65;letter-spacing:.04em}
.poem-sent .hl{color:var(--green);font-weight:600}
.poem-meta{font-size:11px;color:var(--ink3)}
.book-tag{display:inline-block;padding:1px 5px;background:var(--green-l);color:var(--green);border-radius:4px;font-size:10px;margin-right:3px}
.no-poem{font-size:11px;color:var(--ink3);font-style:italic}

/* ── 字池预览面板 ── */
.pool-panel{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.pool-header{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;user-select:none;transition:background .15s}
.pool-header:hover{background:var(--bg)}
.pool-toggle{font-size:11px;color:var(--ink3);transition:transform .2s;line-height:1}
.pool-toggle.open{transform:rotate(90deg)}
.pool-title{font-size:12px;font-weight:600;letter-spacing:.04em;color:var(--ink2)}
.pool-counts{display:flex;gap:8px;margin-left:auto}
.pool-count-tag{font-size:11px;padding:1px 8px;border-radius:4px;font-weight:500}
.pool-count-tag.ze{background:var(--wx-火-bg);color:var(--wx-火)}
.pool-count-tag.ping{background:var(--wx-水-bg);color:var(--wx-水)}
.pool-body{display:none;padding:0 14px 14px;border-top:1px solid var(--border)}
.pool-body.open{display:block}
.pool-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:12px}
.pool-col-title{font-size:11px;font-weight:600;letter-spacing:.06em;color:var(--ink3);margin-bottom:8px;padding:2px 6px;background:var(--bg);border-radius:4px;display:inline-block}
.pool-chips{display:flex;flex-wrap:wrap;gap:5px}
.pool-chip{display:inline-flex;flex-direction:column;align-items:center;padding:4px 7px;border-radius:7px;border:1px solid var(--border);background:var(--bg);cursor:default;min-width:38px;transition:box-shadow .15s}
.pool-chip:hover{box-shadow:0 2px 8px rgba(36,30,18,.1);z-index:1}
.pool-chip-char{font-family:'Noto Serif SC',serif;font-size:16px;font-weight:600;line-height:1.2}
.pool-chip-py{font-size:9px;color:var(--ink3);letter-spacing:.02em;line-height:1.3}
.pool-chip-wx{font-size:8px;font-weight:600;padding:1px 4px;border-radius:3px}
.pool-chip-st{font-size:8px;color:var(--ink3);font-weight:500;line-height:1}

/* 分页 */
.pagination{display:flex;align-items:center;justify-content:center;gap:6px;padding:6px 0}
.page-btn{height:30px;min-width:30px;padding:0 9px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);font-size:12px;color:var(--ink2);cursor:pointer;transition:all .18s}
.page-btn:hover:not(:disabled){border-color:var(--green);color:var(--green)}
.page-btn.active{background:var(--green);border-color:var(--green);color:#fff}
.page-btn:disabled{opacity:.35;cursor:default}

/* 加载/空态 */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 0;gap:16px;color:var(--ink3)}
.spinner{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 0;color:var(--ink3);font-size:14px;line-height:2.2}
.empty .big{font-size:36px;opacity:.3;margin-bottom:8px}

/* 查名专属 */
.lookup-wrap{max-width:560px;margin:48px auto 0;display:flex;flex-direction:column;align-items:center;gap:24px}
.lookup-title{font-family:'Noto Serif SC',serif;font-size:18px;color:var(--ink2);letter-spacing:.06em}
.lookup-input-row{display:flex;align-items:center;gap:10px}
.lookup-surname{width:52px;height:52px;border:2px solid var(--border);border-radius:10px;background:var(--card);font-family:'Noto Serif SC',serif;font-size:26px;font-weight:300;color:var(--ink3);text-align:center;outline:none;transition:border-color .2s}
.lookup-name-input{width:108px;height:52px;border:2px solid var(--green);border-radius:10px;background:var(--card);font-family:'Noto Serif SC',serif;font-size:26px;font-weight:600;color:var(--ink);text-align:center;letter-spacing:.12em;outline:none;transition:border-color .2s;padding:0 6px}
.lookup-name-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,146,74,.15)}
.lookup-hint{font-size:12px;color:var(--ink3)}
.lookup-result{width:100%;display:flex;flex-direction:column;gap:12px}
.lookup-warn{background:#FBF3E4;border:1px solid #e8d5a3;border-radius:8px;padding:10px 14px;font-size:13px;color:#7A5C3A}

/* ── 五格三才 ── */
.wuge-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px;display:flex;flex-direction:column;gap:14px}
.wuge-header{display:flex;align-items:center;justify-content:space-between}
.wuge-title{font-family:'Noto Serif SC',serif;font-size:14px;font-weight:600;color:var(--ink2);letter-spacing:.06em}
.wuge-score-badge{display:flex;align-items:center;gap:6px}
.wuge-score-ring{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.wuge-score-label{font-size:11px;color:var(--ink3);text-align:right;line-height:1.5}
.wuge-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.wuge-cell{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 8px;border-radius:8px;border:1px solid var(--border);background:var(--bg)}
.wuge-cell-label{font-size:10px;color:var(--ink3);letter-spacing:.04em}
.wuge-cell-num{font-family:'Noto Serif SC',serif;font-size:18px;font-weight:600;color:var(--ink)}
.wuge-cell-strokes{font-size:10px;color:var(--ink3)}
.wuge-cell-rating{font-size:11px;font-weight:600;padding:1px 7px;border-radius:10px}
.wuge-cell-desc{font-size:9px;color:var(--ink3);text-align:center;line-height:1.4;margin-top:1px}
.wuge-cell.ji{border-color:#c8dfc8;background:#f0f7f0}.wuge-cell.ji .wuge-cell-rating{background:#3D6B4A;color:#fff}
.wuge-cell.xiong{border-color:#e8b8b3;background:#FAECEB}.wuge-cell.xiong .wuge-cell-rating{background:#B84A3A;color:#fff}
.wuge-cell.zhong{border-color:#e0d5c0;background:#f9f5ee}.wuge-cell.zhong .wuge-cell-rating{background:#B8924A;color:#fff}
.wuge-cell.ren{border-left:3px solid var(--green)}
.sancai-section{display:flex;flex-direction:column;gap:8px}
.sancai-title{font-size:11px;font-weight:600;letter-spacing:.06em;color:var(--ink3)}
.sancai-flow{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.sancai-item{display:flex;flex-direction:column;align-items:center;gap:2px}
.sancai-item-label{font-size:9px;color:var(--ink3)}
.sancai-item-wx{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff}
.sancai-item-num{font-size:9px;color:var(--ink3)}
.sancai-arrow{font-size:16px;padding-bottom:10px}
.sancai-arrow.sheng{color:#3D6B4A}
.sancai-arrow.ke{color:#B84A3A}
.sancai-arrow.tong{color:#B8924A}
.sancai-verdict{font-size:12px;padding:6px 12px;border-radius:6px;line-height:1.6}
.sancai-verdict.sheng{background:#f0f7f0;color:#2d5238;border-left:3px solid #3D6B4A}
.sancai-verdict.ke{background:#FAECEB;color:#7A2518;border-left:3px solid #B84A3A}
.sancai-verdict.mix{background:#FBF3E4;color:#5C4010;border-left:3px solid #B8924A}
.wuge-no-sur{font-size:12px;color:var(--ink3);text-align:center;padding:12px;background:var(--bg);border-radius:8px;border:1px dashed var(--border)}

/* 收藏夹专属 */
.fav-header{display:flex;align-items:center;justify-content:space-between;padding:4px 0}
.fav-title{font-family:'Noto Serif SC',serif;font-size:16px;color:var(--ink)}
.clear-fav-btn{font-size:12px;color:var(--ink3);background:none;border:1px solid var(--border);border-radius:6px;padding:3px 10px;cursor:pointer;transition:all .2s}
.clear-fav-btn:hover{border-color:#B84A3A;color:#B84A3A}

/* 黑名单 */
.ban-add-row{display:flex;gap:6px}
.ban-char-input{flex:1;height:32px;padding:0 10px;border:1px solid var(--border);border-radius:8px;background:var(--card);font-family:'Noto Serif SC',serif;font-size:16px;text-align:center;color:var(--ink);outline:none;transition:border-color .2s}
.ban-char-input:focus{border-color:#B84A3A}
.ban-add-btn{height:32px;padding:0 10px;background:#B84A3A;border:none;border-radius:8px;color:#fff;font-size:13px;cursor:pointer;white-space:nowrap;transition:background .18s}
.ban-add-btn:hover{background:#a03a2a}
.ban-list{display:flex;flex-wrap:wrap;gap:5px;max-height:120px;overflow-y:auto}
.ban-tag{display:inline-flex;align-items:center;gap:4px;background:#FAECEB;border:1px solid #e8b8b3;border-radius:6px;padding:2px 7px;font-size:13px;color:#B84A3A;font-family:'Noto Serif SC',serif;font-weight:500}
.ban-tag button{background:none;border:none;cursor:pointer;font-size:12px;color:#B84A3A;padding:0;line-height:1;opacity:.6;transition:opacity .15s}
.ban-tag button:hover{opacity:1}
.ban-empty{font-size:12px;color:var(--ink3);font-style:italic}
/* 卡片上的拉黑按钮 */
.multi-badge{font-size:9px;padding:1px 4px;border-radius:3px;background:#F0EBF8;color:#7B5EA7;border:1px solid #d4c5eb;cursor:default;white-space:nowrap}
.multi-pys{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px}
.multi-pys span{font-size:10px;color:var(--ink3);background:var(--bg);border-radius:3px;padding:0 4px}
.multi-pys sub{font-size:8px;color:#7B5EA7}
.ban-char-btn{font-size:9px;padding:1px 4px;border-radius:3px;border:1px solid transparent;background:transparent;color:var(--ink3);cursor:pointer;transition:all .15s;white-space:nowrap;opacity:0}
.attr-card:hover .ban-char-btn{opacity:.55}
.ban-char-btn:hover{opacity:1!important;border-color:#e8b8b3;background:#FAECEB;color:#B84A3A}

/* ── AI起名 tab ── */
.ai-wrap{display:flex;flex-direction:column;gap:14px}
.ai-config-bar{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ai-cfg-group{display:flex;align-items:center;gap:7px}
.ai-cfg-label{font-size:11px;font-weight:600;color:var(--ink3);letter-spacing:.04em;white-space:nowrap}
.ai-model-sel{height:32px;padding:0 8px;border:1px solid var(--border);border-radius:8px;background:var(--bg);font-size:13px;color:var(--ink);outline:none;cursor:pointer;max-width:220px}
.ai-apikey-input{height:32px;padding:0 10px;border:1px solid var(--border);border-radius:8px;background:var(--bg);font-size:12px;color:var(--ink);outline:none;width:200px;transition:border-color .2s}
.ai-apikey-input:focus{border-color:var(--green)}
.ai-pool-status{display:flex;align-items:center;gap:6px;flex:1;justify-content:flex-end;min-width:0}
.ai-pool-badge{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500;white-space:nowrap}
.ai-pool-badge.ze{background:var(--wx-火-bg);color:var(--wx-火)}
.ai-pool-badge.ping{background:var(--wx-水-bg);color:var(--wx-水)}
.ai-adjust-btn{height:26px;padding:0 10px;background:transparent;border:1px solid var(--border);border-radius:6px;font-size:11px;color:var(--ink2);cursor:pointer;transition:all .18s;white-space:nowrap}
.ai-adjust-btn:hover{border-color:var(--green);color:var(--green)}
.ai-gen-btn{height:36px;padding:0 22px;background:var(--green);border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;transition:background .18s;letter-spacing:.02em;flex-shrink:0}
.ai-gen-btn:hover:not(:disabled){background:#2d5238}
.ai-gen-btn:disabled{opacity:.4;cursor:default}
.ai-gen-btn.stop{background:#B84A3A}
.ai-gen-btn.stop:hover{background:#a03a2a}
.ai-bazi-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.ai-bazi-summary{list-style:none;padding:10px 14px;font-size:12px;font-weight:600;color:var(--ink2);cursor:pointer;user-select:none;display:flex;align-items:center;gap:8px}
.ai-bazi-summary::marker,.ai-bazi-summary::-webkit-details-marker{display:none}
.ai-bazi-summary::before{content:'▸';font-size:10px;color:var(--ink3);transition:transform .2s;display:inline-block}
details[open] .ai-bazi-summary::before{transform:rotate(90deg)}
.ai-bazi-body{padding:12px 14px 14px;display:flex;flex-direction:column;gap:10px;border-top:1px solid var(--border)}
.ai-bazi-row{display:flex;flex-direction:column;gap:5px}
.ai-bazi-label{font-size:11px;color:var(--ink3);font-weight:500}
.ai-bazi-surname{width:80px;height:34px;border:1px solid var(--border);border-radius:8px;background:var(--bg);font-family:'Noto Serif SC',serif;font-size:18px;font-weight:600;color:var(--ink);text-align:center;outline:none;transition:border-color .2s}
.ai-bazi-surname:focus{border-color:var(--green)}
.ai-bazi-text{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:var(--bg);font-size:12px;color:var(--ink2);line-height:1.7;outline:none;resize:vertical;font-family:'Noto Sans SC',monospace;transition:border-color .2s}
.ai-bazi-text:focus{border-color:var(--green)}
.ai-results{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;min-height:120px}
.ai-idle{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:10px;color:var(--ink3);font-size:14px;text-align:center}
.ai-idle-icon{font-size:32px;opacity:.3}
.ai-idle-warn{font-size:12px;background:#FBF3E4;border:1px solid #e8d5a3;border-radius:6px;padding:8px 14px;color:#7A5C3A;margin-top:8px}
.ai-streaming{padding:20px;display:flex;flex-direction:column;gap:12px}
.ai-streaming-header{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--ink2)}
.ai-stream-count{margin-left:auto;font-size:11px;background:var(--green-l);color:var(--green);padding:2px 8px;border-radius:4px;font-weight:500}
.ai-stream-preview{font-size:10px;color:var(--ink3);background:var(--bg);border-radius:6px;padding:8px 10px;max-height:80px;overflow:hidden;white-space:pre-wrap;word-break:break-all;font-family:monospace}
.ai-error{padding:20px;color:#B84A3A;background:#FAECEB;font-size:13px}
.ai-raw-output{font-size:10px;color:var(--ink3);background:var(--bg);padding:8px;border-radius:4px;max-height:200px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;margin-top:8px}
.ai-table-header{padding:10px 14px 0;font-size:12px;color:var(--ink3);display:flex;align-items:center;gap:10px}
.ai-table-header strong{color:var(--ink)}
.ai-table-wrap{overflow-x:auto;padding-bottom:4px}
.ai-table{width:100%;border-collapse:collapse;font-size:13px}
.ai-table thead tr{border-bottom:2px solid var(--border)}
.ai-table th{padding:8px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--ink3);letter-spacing:.04em;white-space:nowrap;background:var(--bg)}
.ai-table tbody tr{border-bottom:1px solid var(--border);transition:background .15s}
.ai-table tbody tr:hover{background:var(--card-hov)}
.ai-td-num{padding:10px 8px;width:32px;color:var(--ink3);font-size:11px;text-align:center}
.ai-td-name{padding:10px 12px;white-space:nowrap}
.ai-name-sur{font-family:'Noto Serif SC',serif;font-size:17px;font-weight:300;color:var(--ink3)}
.ai-name-chars{font-family:'Noto Serif SC',serif;font-size:19px;font-weight:600;color:var(--ink)}
.ai-char-wx{font-size:10px;font-weight:600;padding:1px 5px;border-radius:4px}
.ai-td-score{padding:10px 12px;width:56px;text-align:center}
.ai-score-badge{font-size:12px;font-weight:700;color:#fff;padding:3px 8px;border-radius:20px;display:inline-block}
.ai-td-text{padding:10px 12px;font-size:12px;color:var(--ink2);max-width:220px;line-height:1.55}
.ai-td-src{padding:10px 12px;font-size:11px;color:var(--ink3);max-width:150px;line-height:1.5}
.ai-td-fav{padding:10px 12px;width:36px;text-align:center}
.ai-fav-btn{background:none;border:none;font-size:16px;cursor:pointer;color:var(--ink3);opacity:.5;transition:opacity .2s,transform .2s;padding:2px}
.ai-fav-btn:hover{opacity:1;transform:scale(1.2)}
.ai-fav-btn.saved{opacity:1;color:var(--gold)}
</style>

<body>

<header>
  <div class="logo">古诗文起名 <span>·</span> 分析台</div>
  <div class="header-tabs">
    <button class="htab active" id="tabBrowse" onclick="switchTab('browse')">浏览</button>
    <button class="htab" id="tabFav" onclick="switchTab('fav')">收藏夹 <span class="fav-count" id="favCount"></span></button>
    <button class="htab" id="tabLookup" onclick="switchTab('lookup')">查名</button>
    <button class="htab" id="tabAI" onclick="switchTab('ai')" style="background:linear-gradient(135deg,var(--green-l),#EEE8F8);color:var(--green)">✦ AI起名</button>
  </div>
  <div class="sep"></div>
  <div class="stat-pill" id="totalPill">加载中…</div>
</header>

<div class="layout">
<!-- ── 侧边栏 ── -->
<aside id="sidebar">

  <div class="filter-group">
    <div class="filter-label">姓氏</div>
    <input class="surname-input" id="surnameInput" maxlength="1" placeholder="姚" value="姚">
  </div>

  <div class="filter-group">
    <label class="radio-opt" style="gap:8px;cursor:pointer" title="多音字：同一汉字有两种以上读音，如"观"(guān/guàn)。启用后这些字会以主读音纳入候选。">
      <input type="checkbox" id="multiToggle" checked style="accent-color:var(--green);width:14px;height:14px">
      <span style="font-size:12px;color:var(--ink2)">包含多音字</span>
      <span style="font-size:10px;color:var(--ink3);margin-left:2px" title="多音字：同一汉字有两种以上读音，如"观"(guān/guàn)。以主读音分类平仄。">ⓘ</span>
    </label>
  </div>

  <hr class="divider">

  <!-- 名一 -->
  <div class="filter-section">
    <div class="section-title">名一</div>

    <div class="filter-group">
      <div class="filter-label">平仄</div>
      <div class="chip-group" id="tone1Group">
        <span class="chip" data-tone="1" title="阴平 — 高平调（如 māo）" style="--chip-active-bg:#3A5F8B;--chip-active-border:#3A5F8B">1声</span>
        <span class="chip" data-tone="2" title="阳平 — 上升调（如 máo）" style="--chip-active-bg:#3A5F8B;--chip-active-border:#3A5F8B">2声</span>
        <span class="chip active" data-tone="3" title="上声 — 降升调（如 mǎo）" style="--chip-active-bg:#B84A3A;--chip-active-border:#B84A3A">3声</span>
        <span class="chip active" data-tone="4" title="去声 — 高降调（如 mào）" style="--chip-active-bg:#B84A3A;--chip-active-border:#B84A3A">4声</span>
      </div>
    </div>

    <div class="filter-group">
      <div class="filter-label">字符搜索</div>
      <input class="search-input" id="q1Input" placeholder="输入汉字或拼音（如 míng）">
    </div>

    <div class="filter-group">
      <div class="filter-label">五行</div>
      <div class="chip-group" id="wx1Group">
        <span class="chip active" data-wx="金">金</span>
        <span class="chip active" data-wx="木">木</span>
        <span class="chip active" data-wx="火">火</span>
        <span class="chip active" data-wx="水">水</span>
        <span class="chip active" data-wx="土">土</span>
      </div>
    </div>

    <div class="filter-group">
      <div class="filter-label">开口度</div>
      <div class="chip-group" id="open1Group">
        <span class="chip active" data-op="large">大开口</span>
        <span class="chip active" data-op="small">小开口</span>
      </div>
    </div>

    <div class="filter-group">
      <div class="filter-label">笔画</div>
      <div class="stroke-row"><span>少</span><input type="range" id="st1Min" min="1" max="25" value="1"><span class="stroke-val" id="st1MinVal">1</span></div>
      <div class="stroke-row"><span>多</span><input type="range" id="st1Max" min="1" max="25" value="25"><span class="stroke-val" id="st1MaxVal">25</span></div>
    </div>
  </div>

  <hr class="divider">

  <!-- 名二 -->
  <div class="filter-section">
    <div class="section-title">名二</div>

    <div class="filter-group">
      <div class="filter-label">平仄</div>
      <div class="chip-group" id="tone2Group">
        <span class="chip active" data-tone="1" title="阴平 — 高平调（如 māo）" style="--chip-active-bg:#3A5F8B;--chip-active-border:#3A5F8B">1声</span>
        <span class="chip active" data-tone="2" title="阳平 — 上升调（如 máo）" style="--chip-active-bg:#3A5F8B;--chip-active-border:#3A5F8B">2声</span>
        <span class="chip" data-tone="3" title="上声 — 降升调（如 mǎo）" style="--chip-active-bg:#B84A3A;--chip-active-border:#B84A3A">3声</span>
        <span class="chip" data-tone="4" title="去声 — 高降调（如 mào）" style="--chip-active-bg:#B84A3A;--chip-active-border:#B84A3A">4声</span>
      </div>
    </div>

    <div class="filter-group">
      <div class="filter-label">字符搜索</div>
      <input class="search-input" id="q2Input" placeholder="输入汉字或拼音（如 huá）">
    </div>

    <div class="filter-group">
      <div class="filter-label">五行</div>
      <div class="chip-group" id="wx2Group">
        <span class="chip active" data-wx="金">金</span>
        <span class="chip active" data-wx="木">木</span>
        <span class="chip active" data-wx="火">火</span>
        <span class="chip active" data-wx="水">水</span>
        <span class="chip active" data-wx="土">土</span>
      </div>
    </div>

    <div class="filter-group">
      <div class="filter-label">开口度</div>
      <div class="chip-group" id="open2Group">
        <span class="chip active" data-op="large">大开口</span>
        <span class="chip active" data-op="small">小开口</span>
      </div>
    </div>

    <div class="filter-group">
      <div class="filter-label">笔画</div>
      <div class="stroke-row"><span>少</span><input type="range" id="st2Min" min="1" max="25" value="1"><span class="stroke-val" id="st2MinVal">1</span></div>
      <div class="stroke-row"><span>多</span><input type="range" id="st2Max" min="1" max="25" value="25"><span class="stroke-val" id="st2MaxVal">25</span></div>
    </div>
  </div>

  <hr class="divider">

  <div class="filter-group">
    <div class="filter-label">诗文来源</div>
    <div class="radio-group">
      <label class="radio-opt"><input type="radio" name="srcFilter" value="all" checked> 全部候选</label>
      <label class="radio-opt"><input type="radio" name="srcFilter" value="poem"> 仅含诗文来源</label>
    </div>
  </div>

  <div class="filter-group">
    <div class="filter-label">排序</div>
    <select class="search-input" id="sortSel" style="cursor:pointer">
      <option value="default">默认（笔画升序）</option>
      <option value="wx">五行分组</option>
      <option value="st_asc">总笔画 少→多</option>
      <option value="st_desc">总笔画 多→少</option>
    </select>
  </div>

  <hr class="divider">
  <button class="reset-btn" id="resetBtn">↺ 重置所有筛选</button>

  <hr class="divider">
  <div class="filter-section">
    <div class="section-title" style="background:#FAECEB;color:#B84A3A">⊘ 黑名单字</div>
    <div class="filter-group">
      <div class="filter-label">加入黑名单</div>
      <div class="ban-add-row">
        <input class="ban-char-input" id="banInput" placeholder="输入单个汉字" maxlength="4">
        <button class="ban-add-btn" onclick="addBanFromInput()">屏蔽</button>
      </div>
    </div>
    <div class="filter-group">
      <div class="filter-label">已屏蔽字 <span id="banCountLabel" style="font-weight:600;color:#B84A3A"></span></div>
      <div class="ban-list" id="banList">
        <span class="ban-empty" id="banEmpty">暂无屏蔽字</span>
      </div>
    </div>
    <button class="reset-btn" id="clearBanBtn" style="background:#FAECEB;color:#B84A3A;border-color:#e8b8b3;display:none" onclick="clearBan()">清空黑名单</button>
    <div id="banSaveHint" style="display:none;font-size:10px;color:var(--ink3);line-height:1.5;padding:4px 2px">
      ⚠ 当前仅存浏览器，重启后保留。<br>
      运行 <code style="background:var(--bg);padding:1px 4px;border-radius:3px">python3 server.py</code> 可存入文件。
    </div>
  </div>
</aside>

<!-- ── 主区 ── -->
<main id="main">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div>正在加载候选字库…</div>
  </div>
</main>
</div>

<script>
const DATA_URL  = '../data/all_chars.json';
const PAGE_SIZE = 60;
const FAV_KEY   = 'baby_name_favorites';
const BAN_KEY   = 'baby_name_blacklist';

const BOOK_NAMES = {shijing:'诗经',chuci:'楚辞',yuefu:'乐府诗集',tangshi:'唐诗三百首',gushi:'古诗三百首',songci:'宋词精选',cifu:'著名辞赋'};
const TONE_NAMES = {1:'阴平',2:'阳平',3:'上声',4:'去声'};
const WX_COLOR   = {
  金:['var(--wx-金)','var(--wx-金-bg)'],木:['var(--wx-木)','var(--wx-木-bg)'],
  火:['var(--wx-火)','var(--wx-火-bg)'],水:['var(--wx-水)','var(--wx-水-bg)'],
  土:['var(--wx-土)','var(--wx-土-bg)'],
};

// ── 状态 ────────────────────────────────────────────
let allChars = [], filtC1 = [], filtC2 = [];
let page = 1, currentTab = 'browse';

const state = {
  surname:'姚',
  q1:'', q2:'',
  multiEnabled: true,
  tone1: new Set(['3','4']),
  tone2: new Set(['1','2']),
  wx1: new Set(['金','木','火','水','土']),
  wx2: new Set(['金','木','火','水','土']),
  open1: new Set(['large','small']),
  open2: new Set(['large','small']),
  st1Min:1, st1Max:25, st2Min:1, st2Max:25,
  srcFilter:'all', sort:'default',
};

// ── 收藏夹 ─────────────────────────────────────────
function loadFavs() {
  try { return JSON.parse(localStorage.getItem(FAV_KEY)||'[]'); } catch{ return []; }
}
function saveFavs(arr) { localStorage.setItem(FAV_KEY, JSON.stringify(arr)); }

function favKey(a, b) { return `${a.c}|${b.c}`; }

function isFaved(a, b) {
  return loadFavs().some(f => f.k === favKey(a,b));
}

function toggleFav(a, b, surname) {
  const k = favKey(a,b);
  let favs = loadFavs();
  const idx = favs.findIndex(f => f.k === k);
  if (idx >= 0) {
    favs.splice(idx, 1);
  } else {
    favs.push({ k, surname, a, b, ts: Date.now() });
  }
  saveFavs(favs);
  updateFavCount();
  // 更新当前页中这张卡的按钮状态
  const btn = document.querySelector(`.fav-btn[data-k="${CSS.escape(k)}"]`);
  if (btn) {
    const now = isFaved(a, b);
    btn.textContent = now ? '♥' : '♡';
    btn.classList.toggle('saved', now);
  }
}

function updateFavCount() {
  const n = loadFavs().length;
  const el = document.getElementById('favCount');
  el.textContent = n > 0 ? n : '';
}

// ── 黑名单（文件优先，localStorage 兜底）──────────────
const API_BAN  = '/api/blacklist';
const USE_API  = window.location.port === '8080'; // 只在本地服务器下启用文件存储

// 内存中的黑名单（Set），始终与文件/localStorage保持同步
let _banSet = new Set();

function loadBan() { return _banSet; }

async function _persistBan() {
  if (USE_API) {
    try {
      await fetch(API_BAN, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify([..._banSet]),
      });
    } catch(e) {
      // API 失败时降级写 localStorage
      localStorage.setItem(BAN_KEY, JSON.stringify([..._banSet]));
    }
  } else {
    localStorage.setItem(BAN_KEY, JSON.stringify([..._banSet]));
  }
}

async function initBan() {
  if (USE_API) {
    try {
      const res = await fetch(API_BAN);
      if (res.ok) {
        const arr = await res.json();
        _banSet = new Set(Array.isArray(arr) ? arr : []);
        // 同步写入 localStorage 作为缓存
        localStorage.setItem(BAN_KEY, JSON.stringify([..._banSet]));
        return;
      }
    } catch(e) { /* 服务器未启动，降级 */ }
  }
  // 降级：从 localStorage 恢复
  try { _banSet = new Set(JSON.parse(localStorage.getItem(BAN_KEY)||'[]')); }
  catch { _banSet = new Set(); }
}

function addBan(ch) {
  if (!ch) return;
  _banSet.add(ch);
  _persistBan();
  renderBanList();
  applyFilter();
}

function removeBan(ch) {
  _banSet.delete(ch);
  _persistBan();
  renderBanList();
  applyFilter();
}

function clearBan() {
  if (!confirm('确认清空黑名单？')) return;
  _banSet.clear();
  _persistBan();
  renderBanList();
  applyFilter();
}

function addBanFromInput() {
  const inp = document.getElementById('banInput');
  const chars = [...inp.value.trim()].filter(c => /[\u4e00-\u9fff]/.test(c));
  chars.forEach(ch => _banSet.add(ch));
  if (chars.length) { _persistBan(); renderBanList(); applyFilter(); }
  inp.value = '';
  inp.focus();
}

function renderBanList() {
  const ban = loadBan();
  const listEl = document.getElementById('banList');
  const emptyEl = document.getElementById('banEmpty');
  const clearBtn = document.getElementById('clearBanBtn');
  const countEl = document.getElementById('banCountLabel');
  const saveHint = document.getElementById('banSaveHint');
  if (!ban.size) {
    listEl.innerHTML = '';
    listEl.appendChild(emptyEl);
    emptyEl.style.display = '';
    clearBtn.style.display = 'none';
    countEl.textContent = '';
    if (saveHint) saveHint.style.display = 'none';
    return;
  }
  emptyEl.style.display = 'none';
  clearBtn.style.display = '';
  countEl.textContent = `(${ban.size})`;
  if (saveHint) saveHint.style.display = USE_API ? 'none' : '';
  listEl.innerHTML = [...ban].map(ch =>
    `<span class="ban-tag">${esc(ch)}<button onclick="removeBan('${esc(ch)}')" title="移出黑名单">×</button></span>`
  ).join('');
  listEl.appendChild(emptyEl);
}

// ── 工具 ────────────────────────────────────────────
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function hlSent(sent, ch) {
  return [...sent].map(c => c===ch?`<span class="hl">${esc(c)}</span>`:esc(c)).join('');
}
function wxStyle(wx){ const [fg,bg]=WX_COLOR[wx]||['#888','#eee']; return `background:${bg};color:${fg}`; }

// 拼音去声调（āáǎà→a 等）
function stripTone(py) {
  return py.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/ü/g,'v');
}

// 检查字是否匹配搜索词
function matchQuery(char, q) {
  if (!q) return true;
  if (char.c === q) return true;
  const stripped = stripTone(char.py);
  const qq = q.toLowerCase().replace(/ü/g,'v');
  return char.py.toLowerCase().includes(qq) || stripped.includes(qq);
}

// ── 页面内容迭代器（惰性，跳过同字/姓氏）────────────
function getPageItems(pg) {
  const skip = (pg-1) * PAGE_SIZE;
  const items = [], surname = state.surname;
  const n1 = filtC1.length, n2 = filtC2.length;
  let cnt = 0;
  outer:
  for (let i=0;i<n1;i++){
    const a=filtC1[i];
    if (surname && a.c===surname) continue;
    for (let j=0;j<n2;j++){
      const b=filtC2[j];
      if (b.c===a.c || (surname && b.c===surname)) continue;
      if (cnt++ < skip) continue;
      items.push({a,b});
      if (items.length>=PAGE_SIZE) break outer;
    }
  }
  return items;
}

function estimateTotal() {
  const surname = state.surname;
  const n1 = filtC1.filter(a=>!surname||a.c!==surname).length;
  const n2 = filtC2.filter(b=>!surname||b.c!==surname).length;
  return n1 * n2;
}

// ── 渲染单卡 ────────────────────────────────────────
function renderCard(a, b, surname, favBtnVisible=true) {
  const [fg1,bg1]=WX_COLOR[a.wx]||['#888','#eee'];
  const [fg2,bg2]=WX_COLOR[b.wx]||['#888','#eee'];
  const sHTML = surname ? `<span class="name-surname">${esc(surname)}</span>` : '';
  const k = favKey(a,b);
  const faved = isFaved(a,b);

  const src = a.sent ? a : (b.sent ? b : null);
  const poemHTML = src
    ? `<div class="poem-block">
        <div class="poem-sent">「${hlSent(src.sent, src===a?a.c:b.c)}」</div>
        <div class="poem-meta">
          ${src.bookkey?`<span class="book-tag">${esc(BOOK_NAMES[src.bookkey]||src.bookkey)}</span>`:''}
          ${src.dynasty?`[${esc(src.dynasty)}]`:''} ${esc(src.author||'')}${src.title?` 《${esc(src.title)}》`:''}
        </div>
       </div>`
    : `<div class="poem-block"><span class="no-poem">暂无诗文来源</span></div>`;

  if (!filtC1.length || !filtC2.length || total===0) {
    mainEl.innerHTML=`<div class="empty"><div class="big">🔍</div>暂无符合条件的候选名<br>请调整筛选条件</div>`;
    return;
  }

  const totalPages = Math.max(1, Math.ceil(total/PAGE_SIZE));
  if (page > totalPages) page = totalPages;
  const items = getPageItems(page);
  const cards = items.map(({a,b})=>renderCard(a,b,surname)).join('');

  if (totalPages>1) {
    const lo=Math.max(1,page-2), hi=Math.min(totalPages,page+2);
    paging=`<div class="pagination"><button class="page-btn" onclick="goPage(${page-1})" ${page<=1?'disabled':''}>‹</button>`;
    if(lo>1) paging+=`<button class="page-btn" onclick="goPage(1)">1</button>`;

    for(let i=lo;i<=hi;i++) paging+=`<button class="page-btn ${i===page?'active':''}" onclick="goPage(${i})">${i}</button>`;
    if(hi<totalPages-1) paging+=`<span style="color:var(--ink3);padding:0 3px">…</span>`;
    if(hi<totalPages) paging+=`<button class="page-btn" onclick="goPage(${totalPages})">${totalPages}</button>`;
    paging+=`<button class="page-btn" onclick="goPage(${page+1})" ${page>=totalPages?'disabled':''}>›</button></div>`;
  }

  mainEl.innerHTML=`
    <div class="combo-bar">
      <span class="combo-tag ze">名一${toneLabel(state.tone1)} ${filtC1.length.toLocaleString()} 字</span>
      <span style="color:var(--ink3);font-size:13px">×</span>

// ── 五格三才 ──────────────────────────────────────────
// 81 数理吉凶（1=吉 2=凶 0=中）
const _W81 = [
  0,1,2,1,2,1,1,1,1,2, // 1-9 (idx 0 unused, 1-9)
  2,1,2,1,2,1,1,1,1,2, // 10-19
  2,1,2,1,1,1,2,2,2,1, // 20-29
  0,1,1,1,2,1,2,1,0,1, // 30-39
  2,1,0,2,2,1,2,1,1,2, // 40-49
  2,0,1,0,2,0,2,1,0,2, // 50-59
  2,1,2,1,2,1,2,1,1,2, // 60-69
  2,0,2,1,2,0,2,0,0,2, // 70-79
  2,1                   // 80-81
];
function _w81(n) {
  // >81 按 ((n-1)%81)+1 折算
  let m = n > 81 ? ((n-1)%81)+1 : n < 1 ? 1 : n;
  return _W81[m] ?? 0; // 0=中 1=吉 2=凶
}
const _WUGE_RATING = ['中','吉','凶'];
const _WUGE_DESC = {
  天格:'祖宗运·先天遗传', 人格:'主运·核心格（最重要）',
  地格:'前运·36岁前', 总格:'后运·晚年总运', 外格:'副运·社交人缘'
};

const _WX5_COLOR = {木:'#3D6B4A',火:'#B84A3A',土:'#7A5C3A',金:'#B8924A',水:'#3A5F8B'};

// 尾数 → 五行
function _digitWx(n) {
  const d = n % 10;
  if (d===1||d===2) return '木';
  if (d===3||d===4) return '火';
  if (d===5||d===6) return '土';
  if (d===7||d===8) return '金';
  return '水'; // 9,0
}

const _WX_SHENG = {木:'火',火:'土',土:'金',金:'水',水:'木'};
const _WX_KE    = {木:'土',土:'水',水:'火',火:'金',金:'木'};

// 判断两五行关系：'sheng'生 'ke'克 'tong'同 'bei_sheng'被生 'bei_ke'被克
function _wxRel(from, to) {
  if (from===to) return 'tong';
  if (_WX_SHENG[from]===to) return 'sheng';
  if (_WX_KE[from]===to)    return 'ke';
  if (_WX_SHENG[to]===from) return 'bei_sheng';
  if (_WX_KE[to]===from)    return 'bei_ke';
  return 'neutral';
}

function calcWuGe(surSt, c1St, c2St) {
  const tian = surSt + 1;
  const ren  = surSt + c1St;
  const di   = c1St  + c2St;
  const zong = surSt + c1St + c2St;
  const wai  = c2St  + 1;          // = zong - ren + 1
  return {tian, ren, di, zong, wai};
}

function wugeScore(tian, ren, di, zong, wai) {
  // 加权：人格 40%，地格 20%，天格 15%，总格 15%，外格 10%
  const base =
    _w81(tian)*100/2 * 0.15 +
    _w81(ren) *100/2 * 0.40 +
    _w81(di)  *100/2 * 0.20 +
    _w81(zong)*100/2 * 0.15 +
    _w81(wai) *100/2 * 0.10;
  // 三才加减分
  const wTian = _digitWx(tian), wRen = _digitWx(ren), wDi = _digitWx(di);
  const r1 = _wxRel(wTian, wRen), r2 = _wxRel(wRen, wDi);
  let bonus = 0;
  const _is = r=>r==='sheng'||r==='bei_sheng'||r==='tong';
  const _ik = r=>r==='ke'||r==='bei_ke';
  if (_is(r1) && _is(r2)) bonus = 12;
  else if (_ik(r1)||_ik(r2)) bonus = -12;
  return Math.min(100, Math.max(0, Math.round(base + bonus)));
}

function renderWuGe(surCh, a, b) {
  const charMap = Object.fromEntries(allChars.map(c=>[c.c,c]));
  if (!surCh) {
    return `<div class="wuge-section">
      <div class="wuge-header"><span class="wuge-title">五格三才</span></div>
      <div class="wuge-no-sur">请在上方输入姓氏以计算五格三才</div>
    </div>`;
  }
  const surData = charMap[surCh];
  if (!surData) {
    return `<div class="wuge-section">
      <div class="wuge-header"><span class="wuge-title">五格三才</span></div>
      <div class="wuge-no-sur">姓氏「${esc(surCh)}」不在字库，无法计算笔画</div>
    </div>`;
  }
  const surSt = surData.st, c1St = a.st, c2St = b.st;
  const {tian, ren, di, zong, wai} = calcWuGe(surSt, c1St, c2St);
  const score = wugeScore(tian, ren, di, zong, wai);

  // 评分颜色
  const scoreColor = score>=85?'#3D6B4A':score>=70?'#3A5F8B':score>=55?'#B8924A':'#B84A3A';
  const scoreLabel = score>=85?'上吉':score>=70?'吉':score>=55?'平':score<40?'大凶':'凶';

  // 五格单格渲染
  function cell(label, n, isMain=false) {
    const r = _w81(n), cls = ['中','ji','xiong'][r];
    const rating = _WUGE_RATING[r];
    const desc = _WUGE_DESC[label]||'';
    return `<div class="wuge-cell ${cls}${isMain?' ren':''}">
      <div class="wuge-cell-label">${label}</div>
      <div class="wuge-cell-num">${n}</div>
      <div class="wuge-cell-strokes">${
        label==='天格'?`${esc(surCh)}+1`:
        label==='人格'?`${esc(surCh)}+${esc(a.c)}`:
        label==='地格'?`${esc(a.c)}+${esc(b.c)}`:
        label==='总格'?`${esc(surCh)}+${esc(a.c)}+${esc(b.c)}`:
        `${esc(b.c)}+1`
      }</div>
      <div class="wuge-cell-rating">${rating}</div>
      <div class="wuge-cell-desc">${esc(desc)}</div>
    </div>`;
  }

  // 三才
  const wTian = _digitWx(tian), wRen = _digitWx(ren), wDi = _digitWx(di);
  const r1 = _wxRel(wTian, wRen), r2 = _wxRel(wRen, wDi);
  // 三才判断：相生包含双向（我生对方 / 对方生我），相克同理
  const isSheng = r => r==='sheng'||r==='bei_sheng';
  const isKe    = r => r==='ke'||r==='bei_ke';
  const arrowCls1 = isSheng(r1)?'sheng':isKe(r1)?'ke':'tong';
  const arrowCls2 = isSheng(r2)?'sheng':isKe(r2)?'ke':'tong';
  const arrowChar = {sheng:'→',ke:'⇢',tong:'＝'};
  // 显示实际相生方向的标注（如"金生水"而非"水生金"）
  function shengLabel(from, to) {
    if (_WX_SHENG[from]===to) return `${from}生${to}`;
    if (_WX_SHENG[to]===from) return `${to}生${from}`;
    if (_WX_KE[from]===to)    return `${from}克${to}`;
    if (_WX_KE[to]===from)    return `${to}克${from}`;
    return from===to?'同行':'无关';
  }
  const arrowTitle1 = shengLabel(wTian,wRen);
  const arrowTitle2 = shengLabel(wRen,wDi);

  const allSheng = isSheng(r1) && isSheng(r2);
  const hasKe    = isKe(r1)||isKe(r2);
  const verdictCls = allSheng?'sheng':hasKe?'ke':'mix';
  const verdictText = allSheng
    ? `三才相生：${arrowTitle1}，${arrowTitle2}，寓意顺遂、基础稳固，为吉配`
    : hasKe
      ? `三才${isKe(r1)?'天人':'人地'}相克：${isKe(r1)?arrowTitle1:arrowTitle2}，可能带来阻力，建议慎选`
      : `三才平和：${wTian}·${wRen}·${wDi}，无明显相生相克，运势平稳`;

  function scItem(label, wxName, num) {
    const col = _WX5_COLOR[wxName]||'#888';
    return `<div class="sancai-item">
      <div class="sancai-item-label">${label}格</div>
      <div class="sancai-item-wx" style="background:${col}">${wxName}</div>
      <div class="sancai-item-num">${num}→尾${num%10||10}</div>
    </div>`;
  }

  return `<div class="wuge-section">
    <div class="wuge-header">
      <span class="wuge-title">五格三才 · 数理分析</span>
      <div class="wuge-score-badge">
        <div>
          <div class="wuge-score-label">${esc(surCh)}${esc(a.c)}${esc(b.c)}<br>笔画 ${surSt}+${c1St}+${c2St}</div>
        </div>
        <div class="wuge-score-ring" style="background:${scoreColor}" title="综合评分">${score}</div>
        <div style="font-size:12px;font-weight:700;color:${scoreColor}">${scoreLabel}</div>
      </div>
    </div>
    <div class="wuge-grid">
      ${cell('天格',tian)} ${cell('人格',ren,true)} ${cell('地格',di)} ${cell('总格',zong)} ${cell('外格',wai)}
    </div>
    <div class="sancai-section">
      <div class="sancai-title">三才五行</div>
      <div class="sancai-flow">
        ${scItem('天',wTian,tian)}
        <div class="sancai-arrow ${arrowCls1}" title="${arrowTitle1}">${arrowChar[arrowCls1]}</div>
        ${scItem('人',wRen,ren)}
        <div class="sancai-arrow ${arrowCls2}" title="${arrowTitle2}">${arrowChar[arrowCls2]}</div>
        ${scItem('地',wDi,di)}
      </div>
      <div class="sancai-verdict ${verdictCls}">${verdictText}</div>
    </div>
  </div>`;
}

function renderLookup() {
  const mainEl = document.getElementById('main');
  const surname = state.surname;
  mainEl.innerHTML = `
    <div class="lookup-wrap">
      <div class="lookup-title">输入名字，查看详细属性</div>
      <div class="lookup-input-row">
        <input class="lookup-surname" id="lookupSurname" maxlength="1"
          value="${esc(surname)}" placeholder="姓" title="姓氏（可选）">
        <input class="lookup-name-input" id="lookupInput" maxlength="2"
          placeholder="名字" autocomplete="off">
      </div>
      <div class="lookup-hint">输入两个汉字，自动显示属性</div>
      <div class="lookup-result" id="lookupResult"></div>
    </div>`;

  // 绑定输入事件
  const nameInp = document.getElementById('lookupInput');
  const surInp  = document.getElementById('lookupSurname');
  nameInp.addEventListener('input', doLookup);
  surInp.addEventListener('input',  doLookup);
  nameInp.focus();
}

function doLookup() {
  const raw  = document.getElementById('lookupInput').value.trim();
  const sur  = document.getElementById('lookupSurname').value.trim();
  const res  = document.getElementById('lookupResult');
  if (!res) return;

  const chars = [...raw].filter(c => /[\u4e00-\u9fff]/.test(c));
  if (chars.length < 2) { res.innerHTML = ''; return; }

  const c1 = chars[0], c2 = chars[1];
  const charMap = Object.fromEntries(allChars.map(c => [c.c, c]));
  const aRaw = charMap[c1], bRaw = charMap[c2];
  // 字库外字符用兜底对象，仍可显示卡片（五行/笔画显示"？"）
  const a = aRaw || makeCharFallback(c1);
  const b = bRaw || makeCharFallback(c2);

  const warns = [];
  if (!aRaw) warns.push(`「${c1}」不在五行字库中，属性为估算`);
  if (!bRaw) warns.push(`「${c2}」不在五行字库中，属性为估算`);

  let html = '';
  if (warns.length) {
    html += `<div class="lookup-warn">⚠ ${warns.join('；')}</div>`;
  }
  // 始终显示卡片；五格三才需要有效笔画数，仅在两字均在字库时显示
  html += renderCard(a, b, sur, true);
  if (aRaw && bRaw) {
    html += renderWuGe(sur, a, b);
  }
  res.innerHTML = html;
}

// ── 过滤 ────────────────────────────────────────────
function sortPool(pool) {
  const s = state.sort;
  if (s==='st_asc')  return [...pool].sort((a,b)=>a.st-b.st);
  if (s==='st_desc') return [...pool].sort((a,b)=>b.st-a.st);
  if (s==='wx')      return [...pool].sort((a,b)=>a.wx.localeCompare(b.wx)||a.st-b.st);
  return [...pool].sort((a,b)=>a.st-b.st);
}

function toneMatch(c, toneSet) {
  return toneSet.has(String(c.tone));
}

function toneLabel(toneSet) {
  const all = ['1','2','3','4'];
  const active = all.filter(t => toneSet.has(t));
  if (active.length === 4) return '四声皆可';
  if (active.length === 0) return '—';
  // 合并连续声调为区间描述
  const hasPing = active.includes('1') || active.includes('2');
  const hasZe   = active.includes('3') || active.includes('4');
  if (hasPing && hasZe) return active.map(t=>t+'声').join('/');
  if (hasPing) return active.length===2 ? '平声' : active.map(t=>t+'声').join('/');
  if (hasZe)  return active.length===2 ? '仄声' : active.map(t=>t+'声').join('/');
  return active.map(t=>t+'声').join('/');
}

function applyFilter() {
  const {tone1,tone2,wx1,wx2,open1,open2,st1Min,st1Max,st2Min,st2Max,srcFilter,q1,q2,multiEnabled} = state;
  const needPoem = srcFilter==='poem';
  const ban = loadBan();

  filtC1 = sortPool(allChars.filter(c =>
    (multiEnabled || !c.multi) &&
    toneMatch(c,tone1) && wx1.has(c.wx) && open1.has(c.open) &&
    c.st>=st1Min && c.st<=st1Max &&
    (!needPoem||!!c.sent) && matchQuery(c,q1) && !ban.has(c.c)
  ));
  filtC2 = sortPool(allChars.filter(c =>
    (multiEnabled || !c.multi) &&
    toneMatch(c,tone2) && wx2.has(c.wx) && open2.has(c.open) &&
    c.st>=st2Min && c.st<=st2Max &&
    (!needPoem||!!c.sent) && matchQuery(c,q2) && !ban.has(c.c)
  ));

  page=1;
  if (currentTab==='browse') renderPage();

  const tot = estimateTotal();
  document.getElementById('totalPill').textContent = `${tot.toLocaleString()} 种组合`;
}

async function init() {

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    allChars = await res.json();
    const ze=allChars.filter(c=>c.tone>=3).length, ping=allChars.filter(c=>c.tone<=2).length;

    updateFavCount();
    await initBan();
    renderBanList();

    document.getElementById('banInput').addEventListener('keydown', e=>{
      if (e.key==='Enter') addBanFromInput();
    });
    document.getElementById('multiToggle').addEventListener('change', e=>{
      state.multiEnabled = e.target.checked;
      applyFilter();
    });
    applyFilter();

      `<div style="color:#B84A3A;text-align:center;padding:40px">

  }
}

// ── parseAIResults ───────────────────────────────────
function parseAIResults(text) {
  const t = text.trim();
  // 1. direct parse
  try { const r = JSON.parse(t); if (Array.isArray(r)) return r; } catch {}
  // 2. extract array
  const m = t.match(/\[[\s\S]*\]/);
  if (m) {
    try { const r = JSON.parse(m[0]); if (Array.isArray(r)) return r; } catch {}
    // 3. fix truncated (remove last incomplete object)
    const fixed = m[0].replace(/,\s*\{[^{}]*$/, ']');
    try { const r = JSON.parse(fixed); if (Array.isArray(r)) return r; } catch {}
  }
  // 4. extract individual complete objects
  const objs = [];
  const re = /\{[^{}]*"name"\s*:[^{}]*\}/g;
  let match;
  while ((match = re.exec(t)) !== null) {
    try { objs.push(JSON.parse(match[0])); } catch {}
  }
  return objs.length ? objs : null;
}

// ── renderAITable ─────────────────────────────────────
function renderAITable(results, surname) {
  aiSortedResults = [...results].sort((a, b) => (b.score||0) - (a.score||0));

  const rows = aiSortedResults.map((r, i) => {
    // 去除 LLM 可能在 name 里带上的姓氏前缀
    let name = (r.name || '').trim();
    if (surname && name.startsWith(surname)) name = name.slice(surname.length);
    name = name.slice(0, 2); // 最多两字

    const c1char = name[0] || '';
    const c2char = name[1] || '';
    // 字库外字符使用兜底对象，确保始终可收藏和显示
    const a = allChars.find(c => c.c === c1char) || makeCharFallback(c1char);
    const b = allChars.find(c => c.c === c2char) || makeCharFallback(c2char);
    const score  = Math.min(100, Math.max(0, Number(r.score) || 0));
    const scoreColor = score >= 85 ? '#3D6B4A' : score >= 70 ? '#B8924A' : '#B84A3A';
    const faved  = (c1char && c2char) ? isFaved(a, b) : false;

    const wxHtml = (c1char && c2char)
      ? `<span class="ai-char-wx" style="${a._fallback?'background:#eee;color:#888':wxStyle(a.wx)}">${esc(a.wx)}</span>
         <span class="ai-char-wx" style="${b._fallback?'background:#eee;color:#888':wxStyle(b.wx)}">${esc(b.wx)}</span>`
      : '';

    const favHtml = (c1char && c2char)
      ? `<button class="ai-fav-btn ${faved?'saved':''}"
           onclick="aiToggleFav(${i},this)"
           title="${faved?'移出收藏':'加入收藏'}">${faved?'♥':'♡'}</button>`

    return `<tr>

      <td class="ai-td-src">${esc(r.source||'—')}</td>

  }).join('');

  document.getElementById('aiResults').innerHTML = `

        </tr></thead>

  btn.classList.toggle('saved', faved);
}

// ── generateAINames ───────────────────────────────────
async function generateAINames() {
  if (aiGenerating) {
    if (aiAbortCtrl) aiAbortCtrl.abort();
    return;
  }

  const apiKey  = document.getElementById('aiApiKey')?.value.trim()  || '';
  const model   = document.getElementById('aiModelSel')?.value        || AI_DEFAULT_MODEL;
  const surname = document.getElementById('aiBaziSurname')?.value.trim() || '姚';
  const baziText= document.getElementById('aiBaziText')?.value.trim() || '';
  const genCount= parseInt(document.getElementById('aiCountSel')?.value || '20', 10);

  if (!filtC1.length || !filtC2.length) {
    alert('候选字池为空，请先在「浏览」页设置筛选条件'); return;
  }

  // 超过 300 字随机采样
  const MAX_POOL = 300;
  const pool1 = filtC1.length > MAX_POOL
    ? [...filtC1].sort(()=>Math.random()-.5).slice(0, MAX_POOL)
    : filtC1;
  const pool2 = filtC2.length > MAX_POOL
    ? [...filtC2].sort(()=>Math.random()-.5).slice(0, MAX_POOL)
    : filtC2;
  const chars1 = pool1.map(c => c.c).join(' ');
  const chars2 = pool2.map(c => c.c).join(' ');

  const prompt =
`你是一位精通中国传统命名学与诗词文化的起名大师。请为以下宝宝推荐${genCount}个好名字。

【宝宝信息】
姓氏：${surname}
${baziText}

【候选字池（必须从中选字）】
名字第一个字必须从以下 ${pool1.length} 个字中选取（空格分隔）：
${chars1}

名字第二个字必须从以下 ${pool2.length} 个字中选取（空格分隔）：
${chars2}

【起名要求】
1. 每个名字由两字组成，第一字来自上方"名一字池"，第二字来自"名二字池"
2. 根据八字五行，优先选能补充偏弱五行的字
3. 名字与"${surname}"姓搭配响亮好听，字义美好积极
4. 尽量选有诗词典故出处的字，在 source 字段注明来源
5. 避免谐音不雅、寓意消极的搭配

【严格输出格式】
直接输出 JSON 数组，共${genCount}条，每条格式如下：
[{"name":"两字名（只含名，不含姓）","score":0到100的整数,"wx":"五行补益简述","meaning":"字义与意境","source":"诗词出处，无则空字符串"},...]

⚠ name 字段只写名字的两个字，不要包含姓氏"${surname}"。
只输出 JSON 数组，首行 [ 尾行 ]，不要任何额外文字或说明。`;

  // 更新 UI 状态
  aiGenerating  = true;
  aiAbortCtrl   = new AbortController();
  const genBtn  = document.getElementById('aiGenBtn');
  genBtn.textContent  = '⏹ 停止生成';
  genBtn.classList.add('stop');

  document.getElementById('aiResults').innerHTML = `
    <div class="ai-streaming">
      <div class="ai-streaming-header">
        <div class="spinner" style="width:20px;height:20px;border-width:2px"></div>
        <span id="aiStreamStatus">正在连接 ${esc(model)}…</span>
        <span id="aiStreamCount" class="ai-stream-count"></span>
      </div>
      <div class="ai-stream-preview" id="aiStreamPreview"></div>
    </div>`;

  try {
    const resp = await fetch('/api/ai-names', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ api_key: apiKey, model, prompt }),
      signal: aiAbortCtrl.signal,
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    const reader  = resp.body.getReader();
    const decoder = new TextDecoder();
    let sseBuffer   = '';
    let fullContent = '';

    outer: while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      sseBuffer += decoder.decode(value, { stream: true });
      const lines = sseBuffer.split('\n');
      sseBuffer = lines.pop(); // incomplete line

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') break outer;
        try {
          const obj = JSON.parse(data);
          if (obj.error) throw new Error(obj.error);
          const content = obj.choices?.[0]?.delta?.content;
          if (content) {
            fullContent += content;
            const cnt = (fullContent.match(/"name"\s*:/g) || []).length;
            const statusEl  = document.getElementById('aiStreamStatus');
            const countEl   = document.getElementById('aiStreamCount');
            const previewEl = document.getElementById('aiStreamPreview');
            if (statusEl)  statusEl.textContent  = `正在生成 (${cnt} / ${genCount})…`;
            if (countEl)   countEl.textContent   = `已生成 ${cnt} 个`;
            if (previewEl) previewEl.textContent = fullContent.slice(-200);
          }
        } catch(e) {
          if (e.name === 'AbortError') break outer;
          if (e.message.startsWith('LLM API')) throw e;
          // 忽略部分 SSE 数据解析错误
        }
      }
    }

    const parsed = parseAIResults(fullContent);
    if (parsed && parsed.length > 0) {
      renderAITable(parsed, surname);
    } else {
      document.getElementById('aiResults').innerHTML = `
        <div class="ai-error">
          <strong>解析失败</strong>：AI 返回的内容无法解析为名字列表。
          <details style="margin-top:8px">
            <summary style="cursor:pointer;font-size:11px;color:var(--ink3)">查看原始输出</summary>
            <pre class="ai-raw-output">${esc(fullContent)}</pre>
          </details>
        </div>`;
    }
  } catch(e) {
    if (e.name === 'AbortError') {
      document.getElementById('aiResults').innerHTML =
        `<div class="ai-idle"><div class="ai-idle-icon">⏸</div><div>已停止生成</div></div>`;
    } else {
      document.getElementById('aiResults').innerHTML =
        `<div class="ai-error">生成失败：${esc(e.message)}</div>`;
    }
  } finally {
    aiGenerating = false;
    const btn2 = document.getElementById('aiGenBtn');
    if (btn2) {
      btn2.textContent = '✦ 生成 100 个名字';
      btn2.classList.remove('stop');
    }
  }
}
</script>
</body>
</html>
