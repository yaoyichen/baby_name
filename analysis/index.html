<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>古诗文起名 · 分析台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F4EFE4;--sidebar:#EDE7D9;--card:#FDFAF4;--card-hov:#FFF8EE;
  --ink:#241E12;--ink2:#5C5242;--ink3:#9B8F7E;
  --green:#3D6B4A;--green-l:#EBF2EC;--gold:#B8924A;--border:#DDD5C4;
  --shadow:0 1px 4px rgba(36,30,18,.08),0 4px 16px rgba(36,30,18,.05);
  --wx-金:#B8924A;--wx-金-bg:#FBF3E4;
  --wx-木:#3D6B4A;--wx-木-bg:#EBF2EC;
  --wx-火:#B84A3A;--wx-火-bg:#FAECEB;
  --wx-水:#3A5F8B;--wx-水-bg:#E6EDF5;
  --wx-土:#7A5C3A;--wx-土-bg:#F2EBDF;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans SC','PingFang SC',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;flex-direction:column}

/* ── 顶栏 ── */
header{background:var(--card);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:200;box-shadow:0 1px 8px rgba(36,30,18,.06)}
.logo{font-family:'Noto Serif SC',serif;font-size:17px;font-weight:600;color:var(--green);white-space:nowrap}
.logo span{color:var(--gold)}
.header-tabs{display:flex;gap:2px;background:var(--bg);border-radius:8px;padding:3px}
.htab{padding:4px 14px;border-radius:6px;font-size:13px;cursor:pointer;color:var(--ink2);transition:all .18s;white-space:nowrap;border:none;background:transparent}
.htab.active{background:var(--card);color:var(--ink);font-weight:500;box-shadow:0 1px 4px rgba(36,30,18,.1)}
.fav-count{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;background:var(--gold);color:#fff;border-radius:50%;font-size:10px;font-weight:600;margin-left:4px;vertical-align:middle}
.fav-count:empty{display:none}
header .sep{flex:1}
.stat-pill{font-size:12px;color:var(--ink3);background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:3px 12px;white-space:nowrap}

/* ── 布局 ── */
.layout{display:flex;flex:1;overflow:hidden;height:calc(100vh - 52px)}

/* ── 侧边栏 ── */
aside{width:248px;min-width:248px;background:var(--sidebar);border-right:1px solid var(--border);overflow-y:auto;padding:16px 14px 40px;display:flex;flex-direction:column;gap:16px}
.filter-section{display:flex;flex-direction:column;gap:10px}
.section-title{font-size:12px;font-weight:600;letter-spacing:.06em;color:var(--green);padding:4px 8px;background:var(--green-l);border-radius:6px;text-align:center}
.filter-group{display:flex;flex-direction:column;gap:6px}
.filter-label{font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3)}
.surname-input{width:100%;height:36px;padding:0 10px;border:1px solid var(--border);border-radius:8px;background:var(--card);font-family:'Noto Serif SC',serif;font-size:18px;font-weight:600;color:var(--ink);text-align:center;letter-spacing:.1em;outline:none;transition:border-color .2s}
.surname-input:focus{border-color:var(--green)}
.search-input{width:100%;height:32px;padding:0 10px;border:1px solid var(--border);border-radius:8px;background:var(--card);font-size:13px;color:var(--ink);outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--green)}
.search-input::placeholder{color:var(--ink3)}
.chip-group{display:flex;flex-wrap:wrap;gap:5px}
.chip{cursor:pointer;border:1.5px solid var(--border);border-radius:16px;padding:2px 10px;font-size:12px;background:var(--card);color:var(--ink2);transition:all .18s;user-select:none}
.chip.active{background:var(--chip-active-bg,var(--green));border-color:var(--chip-active-border,var(--green));color:#fff}
.chip[data-wx="金"].active{background:var(--wx-金);border-color:var(--wx-金)}
.chip[data-wx="木"].active{background:var(--wx-木);border-color:var(--wx-木)}
.chip[data-wx="火"].active{background:var(--wx-火);border-color:var(--wx-火)}
.chip[data-wx="水"].active{background:var(--wx-水);border-color:var(--wx-水)}
.chip[data-wx="土"].active{background:var(--wx-土);border-color:var(--wx-土)}
.stroke-row{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ink2)}
.stroke-row input[type=range]{flex:1;accent-color:var(--green);height:4px}
.stroke-val{min-width:20px;text-align:center;font-size:11px;color:var(--ink);font-weight:500}
.divider{border:none;border-top:1px solid var(--border);margin:2px 0}
.reset-btn{width:100%;height:34px;background:transparent;border:1.5px solid var(--border);border-radius:8px;font-size:12px;color:var(--ink2);cursor:pointer;transition:all .2s}
.reset-btn:hover{border-color:var(--green);color:var(--green)}
.radio-group{display:flex;flex-direction:column;gap:5px}
.radio-opt{display:flex;align-items:center;gap:7px;font-size:12px;cursor:pointer;color:var(--ink2)}
.radio-opt input{accent-color:var(--green)}

/* ── 主区 ── */
main{flex:1;overflow-y:auto;padding:18px 22px 48px;display:flex;flex-direction:column;gap:14px}

.combo-bar{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.combo-tag{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500;white-space:nowrap}
.combo-tag.ze{background:var(--wx-火-bg);color:var(--wx-火)}
.combo-tag.ping{background:var(--wx-水-bg);color:var(--wx-水)}
.combo-count{font-size:13px;color:var(--ink2)}
.combo-count strong{font-size:15px;color:var(--ink);font-family:'Noto Serif SC',serif}

.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.result-info{font-size:12px;color:var(--ink3)}
.toolbar-sep{flex:1}

/* 名字卡片 */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(268px,1fr));gap:12px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 14px 12px;display:flex;flex-direction:column;gap:10px;box-shadow:var(--shadow);transition:transform .18s,box-shadow .18s;position:relative}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(36,30,18,.12);background:var(--card-hov)}
.fav-btn{position:absolute;top:12px;right:12px;background:none;border:none;font-size:18px;cursor:pointer;padding:2px;line-height:1;opacity:.5;transition:opacity .2s,transform .2s}
.fav-btn:hover{opacity:1;transform:scale(1.2)}
.fav-btn.saved{opacity:1;color:var(--gold)}
.name-row{display:flex;align-items:baseline;padding-right:28px}
.name-surname{font-family:'Noto Serif SC',serif;font-size:26px;font-weight:300;color:var(--ink3)}
.name-chars{font-family:'Noto Serif SC',serif;font-size:30px;font-weight:600;color:var(--ink);letter-spacing:.08em}
.name-py{margin-left:auto;font-size:11px;color:var(--ink3);line-height:1.6;text-align:right}
.attrs{display:flex;gap:7px;flex-wrap:wrap}
.attr-card{flex:1;min-width:96px;border-radius:8px;padding:6px 9px;display:flex;flex-direction:column;gap:3px}
.attr-char{font-family:'Noto Serif SC',serif;font-size:16px;font-weight:600}
.attr-detail{font-size:11px;display:flex;gap:5px;flex-wrap:wrap}
.wx-badge{font-size:10px;font-weight:600;padding:1px 5px;border-radius:4px}
.tone-badge,.stroke-badge,.open-badge{font-size:10px;color:var(--ink3)}
.poem-block{border-top:1px solid var(--border);padding-top:8px;display:flex;flex-direction:column;gap:3px}
.poem-sent{font-family:'Noto Serif SC',serif;font-size:13px;color:var(--ink2);line-height:1.65;letter-spacing:.04em}
.poem-sent .hl{color:var(--green);font-weight:600}
.poem-meta{font-size:11px;color:var(--ink3)}
.book-tag{display:inline-block;padding:1px 5px;background:var(--green-l);color:var(--green);border-radius:4px;font-size:10px;margin-right:3px}
.no-poem{font-size:11px;color:var(--ink3);font-style:italic}

/* ── 字池预览面板 ── */
.pool-panel{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.pool-header{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;user-select:none;transition:background .15s}
.pool-header:hover{background:var(--bg)}
.pool-toggle{font-size:11px;color:var(--ink3);transition:transform .2s;line-height:1}
.pool-toggle.open{transform:rotate(90deg)}
.pool-title{font-size:12px;font-weight:600;letter-spacing:.04em;color:var(--ink2)}
.pool-counts{display:flex;gap:8px;margin-left:auto}
.pool-count-tag{font-size:11px;padding:1px 8px;border-radius:4px;font-weight:500}
.pool-count-tag.ze{background:var(--wx-火-bg);color:var(--wx-火)}
.pool-count-tag.ping{background:var(--wx-水-bg);color:var(--wx-水)}
.pool-body{display:none;padding:0 14px 14px;border-top:1px solid var(--border)}
.pool-body.open{display:block}
.pool-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:12px}
.pool-col-title{font-size:11px;font-weight:600;letter-spacing:.06em;color:var(--ink3);margin-bottom:8px;padding:2px 6px;background:var(--bg);border-radius:4px;display:inline-block}
.pool-chips{display:flex;flex-wrap:wrap;gap:5px}
.pool-chip{display:inline-flex;flex-direction:column;align-items:center;padding:4px 7px;border-radius:7px;border:1px solid var(--border);background:var(--bg);cursor:default;min-width:38px;transition:box-shadow .15s}
.pool-chip:hover{box-shadow:0 2px 8px rgba(36,30,18,.1);z-index:1}
.pool-chip-char{font-family:'Noto Serif SC',serif;font-size:16px;font-weight:600;line-height:1.2}
.pool-chip-py{font-size:9px;color:var(--ink3);letter-spacing:.02em;line-height:1.3}
.pool-chip-wx{font-size:8px;font-weight:600;padding:1px 4px;border-radius:3px}
.pool-chip-st{font-size:8px;color:var(--ink3);font-weight:500;line-height:1}

/* 分页 */
.pagination{display:flex;align-items:center;justify-content:center;gap:6px;padding:6px 0}
.page-btn{height:30px;min-width:30px;padding:0 9px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);font-size:12px;color:var(--ink2);cursor:pointer;transition:all .18s}
.page-btn:hover:not(:disabled){border-color:var(--green);color:var(--green)}
.page-btn.active{background:var(--green);border-color:var(--green);color:#fff}
.page-btn:disabled{opacity:.35;cursor:default}

/* 加载/空态 */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 0;gap:16px;color:var(--ink3)}
.spinner{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 0;color:var(--ink3);font-size:14px;line-height:2.2}
.empty .big{font-size:36px;opacity:.3;margin-bottom:8px}

/* 收藏夹专属 */
.fav-header{display:flex;align-items:center;justify-content:space-between;padding:4px 0}
.fav-title{font-family:'Noto Serif SC',serif;font-size:16px;color:var(--ink)}
.clear-fav-btn{font-size:12px;color:var(--ink3);background:none;border:1px solid var(--border);border-radius:6px;padding:3px 10px;cursor:pointer;transition:all .2s}
.clear-fav-btn:hover{border-color:#B84A3A;color:#B84A3A}

/* 黑名单 */
.ban-add-row{display:flex;gap:6px}
.ban-char-input{flex:1;height:32px;padding:0 10px;border:1px solid var(--border);border-radius:8px;background:var(--card);font-family:'Noto Serif SC',serif;font-size:16px;text-align:center;color:var(--ink);outline:none;transition:border-color .2s}
.ban-char-input:focus{border-color:#B84A3A}
.ban-add-btn{height:32px;padding:0 10px;background:#B84A3A;border:none;border-radius:8px;color:#fff;font-size:13px;cursor:pointer;white-space:nowrap;transition:background .18s}
.ban-add-btn:hover{background:#a03a2a}
.ban-list{display:flex;flex-wrap:wrap;gap:5px;max-height:120px;overflow-y:auto}
.ban-tag{display:inline-flex;align-items:center;gap:4px;background:#FAECEB;border:1px solid #e8b8b3;border-radius:6px;padding:2px 7px;font-size:13px;color:#B84A3A;font-family:'Noto Serif SC',serif;font-weight:500}
.ban-tag button{background:none;border:none;cursor:pointer;font-size:12px;color:#B84A3A;padding:0;line-height:1;opacity:.6;transition:opacity .15s}
.ban-tag button:hover{opacity:1}
.ban-empty{font-size:12px;color:var(--ink3);font-style:italic}
/* 卡片上的拉黑按钮 */
.ban-char-btn{font-size:9px;padding:1px 4px;border-radius:3px;border:1px solid transparent;background:transparent;color:var(--ink3);cursor:pointer;transition:all .15s;white-space:nowrap;opacity:0}
.attr-card:hover .ban-char-btn{opacity:.55}
.ban-char-btn:hover{opacity:1!important;border-color:#e8b8b3;background:#FAECEB;color:#B84A3A}
</style>
</head>
<body>

<header>
  <div class="logo">古诗文起名 <span>·</span> 分析台</div>
  <div class="header-tabs">
    <button class="htab active" id="tabBrowse" onclick="switchTab('browse')">浏览</button>
    <button class="htab" id="tabFav" onclick="switchTab('fav')">收藏夹 <span class="fav-count" id="favCount"></span></button>
  </div>
  <div class="sep"></div>
  <div class="stat-pill" id="totalPill">加载中…</div>
</header>

<div class="layout">
<!-- ── 侧边栏 ── -->
<aside id="sidebar">

  <div class="filter-group">
    <div class="filter-label">姓氏</div>
    <input class="surname-input" id="surnameInput" maxlength="1" placeholder="姚">
  </div>

  <hr class="divider">

  <!-- 名一 -->
  <div class="filter-section">
    <div class="section-title">名一</div>

    <div class="filter-group">
      <div class="filter-label">平仄</div>
      <div class="chip-group" id="tone1Group">
        <span class="chip" data-tone="1" title="阴平 — 高平调（如 māo）" style="--chip-active-bg:#3A5F8B;--chip-active-border:#3A5F8B">1声</span>
        <span class="chip" data-tone="2" title="阳平 — 上升调（如 máo）" style="--chip-active-bg:#3A5F8B;--chip-active-border:#3A5F8B">2声</span>
        <span class="chip active" data-tone="3" title="上声 — 降升调（如 mǎo）" style="--chip-active-bg:#B84A3A;--chip-active-border:#B84A3A">3声</span>
        <span class="chip active" data-tone="4" title="去声 — 高降调（如 mào）" style="--chip-active-bg:#B84A3A;--chip-active-border:#B84A3A">4声</span>
      </div>
    </div>

    <div class="filter-group">
      <div class="filter-label">字符搜索</div>
      <input class="search-input" id="q1Input" placeholder="输入汉字或拼音（如 míng）">
    </div>

    <div class="filter-group">
      <div class="filter-label">五行</div>
      <div class="chip-group" id="wx1Group">
        <span class="chip active" data-wx="金">金</span>
        <span class="chip active" data-wx="木">木</span>
        <span class="chip active" data-wx="火">火</span>
        <span class="chip active" data-wx="水">水</span>
        <span class="chip active" data-wx="土">土</span>
      </div>
    </div>

    <div class="filter-group">
      <div class="filter-label">开口度</div>
      <div class="chip-group" id="open1Group">
        <span class="chip active" data-op="large">大开口</span>
        <span class="chip active" data-op="small">小开口</span>
      </div>
    </div>

    <div class="filter-group">
      <div class="filter-label">笔画</div>
      <div class="stroke-row"><span>少</span><input type="range" id="st1Min" min="1" max="25" value="1"><span class="stroke-val" id="st1MinVal">1</span></div>
      <div class="stroke-row"><span>多</span><input type="range" id="st1Max" min="1" max="25" value="25"><span class="stroke-val" id="st1MaxVal">25</span></div>
    </div>
  </div>

  <hr class="divider">

  <!-- 名二 -->
  <div class="filter-section">
    <div class="section-title">名二</div>

    <div class="filter-group">
      <div class="filter-label">平仄</div>
      <div class="chip-group" id="tone2Group">
        <span class="chip active" data-tone="1" title="阴平 — 高平调（如 māo）" style="--chip-active-bg:#3A5F8B;--chip-active-border:#3A5F8B">1声</span>
        <span class="chip active" data-tone="2" title="阳平 — 上升调（如 máo）" style="--chip-active-bg:#3A5F8B;--chip-active-border:#3A5F8B">2声</span>
        <span class="chip" data-tone="3" title="上声 — 降升调（如 mǎo）" style="--chip-active-bg:#B84A3A;--chip-active-border:#B84A3A">3声</span>
        <span class="chip" data-tone="4" title="去声 — 高降调（如 mào）" style="--chip-active-bg:#B84A3A;--chip-active-border:#B84A3A">4声</span>
      </div>
    </div>

    <div class="filter-group">
      <div class="filter-label">字符搜索</div>
      <input class="search-input" id="q2Input" placeholder="输入汉字或拼音（如 huá）">
    </div>

    <div class="filter-group">
      <div class="filter-label">五行</div>
      <div class="chip-group" id="wx2Group">
        <span class="chip active" data-wx="金">金</span>
        <span class="chip active" data-wx="木">木</span>
        <span class="chip active" data-wx="火">火</span>
        <span class="chip active" data-wx="水">水</span>
        <span class="chip active" data-wx="土">土</span>
      </div>
    </div>

    <div class="filter-group">
      <div class="filter-label">开口度</div>
      <div class="chip-group" id="open2Group">
        <span class="chip active" data-op="large">大开口</span>
        <span class="chip active" data-op="small">小开口</span>
      </div>
    </div>

    <div class="filter-group">
      <div class="filter-label">笔画</div>
      <div class="stroke-row"><span>少</span><input type="range" id="st2Min" min="1" max="25" value="1"><span class="stroke-val" id="st2MinVal">1</span></div>
      <div class="stroke-row"><span>多</span><input type="range" id="st2Max" min="1" max="25" value="25"><span class="stroke-val" id="st2MaxVal">25</span></div>
    </div>
  </div>

  <hr class="divider">

  <div class="filter-group">
    <div class="filter-label">诗文来源</div>
    <div class="radio-group">
      <label class="radio-opt"><input type="radio" name="srcFilter" value="all" checked> 全部候选</label>
      <label class="radio-opt"><input type="radio" name="srcFilter" value="poem"> 仅含诗文来源</label>
    </div>
  </div>

  <div class="filter-group">
    <div class="filter-label">排序</div>
    <select class="search-input" id="sortSel" style="cursor:pointer">
      <option value="default">默认（笔画升序）</option>
      <option value="wx">五行分组</option>
      <option value="st_asc">总笔画 少→多</option>
      <option value="st_desc">总笔画 多→少</option>
    </select>
  </div>

  <hr class="divider">
  <button class="reset-btn" id="resetBtn">↺ 重置所有筛选</button>

  <hr class="divider">
  <div class="filter-section">
    <div class="section-title" style="background:#FAECEB;color:#B84A3A">⊘ 黑名单字</div>
    <div class="filter-group">
      <div class="filter-label">加入黑名单</div>
      <div class="ban-add-row">
        <input class="ban-char-input" id="banInput" placeholder="输入单个汉字" maxlength="4">
        <button class="ban-add-btn" onclick="addBanFromInput()">屏蔽</button>
      </div>
    </div>
    <div class="filter-group">
      <div class="filter-label">已屏蔽字 <span id="banCountLabel" style="font-weight:600;color:#B84A3A"></span></div>
      <div class="ban-list" id="banList">
        <span class="ban-empty" id="banEmpty">暂无屏蔽字</span>
      </div>
    </div>
    <button class="reset-btn" id="clearBanBtn" style="background:#FAECEB;color:#B84A3A;border-color:#e8b8b3;display:none" onclick="clearBan()">清空黑名单</button>
    <div id="banSaveHint" style="display:none;font-size:10px;color:var(--ink3);line-height:1.5;padding:4px 2px">
      ⚠ 当前仅存浏览器，重启后保留。<br>
      运行 <code style="background:var(--bg);padding:1px 4px;border-radius:3px">python3 server.py</code> 可存入文件。
    </div>
  </div>
</aside>

<!-- ── 主区 ── -->
<main id="main">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div>正在加载候选字库…</div>
  </div>
</main>
</div>

<script>
const DATA_URL  = '../data/all_chars.json';
const PAGE_SIZE = 60;
const FAV_KEY   = 'baby_name_favorites';
const BAN_KEY   = 'baby_name_blacklist';

const BOOK_NAMES = {shijing:'诗经',chuci:'楚辞',yuefu:'乐府诗集',tangshi:'唐诗三百首',gushi:'古诗三百首',songci:'宋词精选',cifu:'著名辞赋'};
const TONE_NAMES = {1:'阴平',2:'阳平',3:'上声',4:'去声'};
const WX_COLOR   = {
  金:['var(--wx-金)','var(--wx-金-bg)'],木:['var(--wx-木)','var(--wx-木-bg)'],
  火:['var(--wx-火)','var(--wx-火-bg)'],水:['var(--wx-水)','var(--wx-水-bg)'],
  土:['var(--wx-土)','var(--wx-土-bg)'],
};

// ── 状态 ────────────────────────────────────────────
let allChars = [], filtC1 = [], filtC2 = [];
let page = 1, currentTab = 'browse';

const state = {
  surname:'',
  q1:'', q2:'',
  tone1: new Set(['3','4']),
  tone2: new Set(['1','2']),
  wx1: new Set(['金','木','火','水','土']),
  wx2: new Set(['金','木','火','水','土']),
  open1: new Set(['large','small']),
  open2: new Set(['large','small']),
  st1Min:1, st1Max:25, st2Min:1, st2Max:25,
  srcFilter:'all', sort:'default',
};

// ── 收藏夹 ─────────────────────────────────────────
function loadFavs() {
  try { return JSON.parse(localStorage.getItem(FAV_KEY)||'[]'); } catch{ return []; }
}
function saveFavs(arr) { localStorage.setItem(FAV_KEY, JSON.stringify(arr)); }

function favKey(a, b) { return `${a.c}|${b.c}`; }

function isFaved(a, b) {
  return loadFavs().some(f => f.k === favKey(a,b));
}

function toggleFav(a, b, surname) {
  const k = favKey(a,b);
  let favs = loadFavs();
  const idx = favs.findIndex(f => f.k === k);
  if (idx >= 0) {
    favs.splice(idx, 1);
  } else {
    favs.push({ k, surname, a, b, ts: Date.now() });
  }
  saveFavs(favs);
  updateFavCount();
  // 更新当前页中这张卡的按钮状态
  const btn = document.querySelector(`.fav-btn[data-k="${CSS.escape(k)}"]`);
  if (btn) {
    const now = isFaved(a, b);
    btn.textContent = now ? '♥' : '♡';
    btn.classList.toggle('saved', now);
  }
}

function updateFavCount() {
  const n = loadFavs().length;
  const el = document.getElementById('favCount');
  el.textContent = n > 0 ? n : '';
}

// ── 黑名单（文件优先，localStorage 兜底）──────────────
const API_BAN  = '/api/blacklist';
const USE_API  = window.location.port === '8080'; // 只在本地服务器下启用文件存储

// 内存中的黑名单（Set），始终与文件/localStorage保持同步
let _banSet = new Set();

function loadBan() { return _banSet; }

async function _persistBan() {
  if (USE_API) {
    try {
      await fetch(API_BAN, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify([..._banSet]),
      });
    } catch(e) {
      // API 失败时降级写 localStorage
      localStorage.setItem(BAN_KEY, JSON.stringify([..._banSet]));
    }
  } else {
    localStorage.setItem(BAN_KEY, JSON.stringify([..._banSet]));
  }
}

async function initBan() {
  if (USE_API) {
    try {
      const res = await fetch(API_BAN);
      if (res.ok) {
        const arr = await res.json();
        _banSet = new Set(Array.isArray(arr) ? arr : []);
        // 同步写入 localStorage 作为缓存
        localStorage.setItem(BAN_KEY, JSON.stringify([..._banSet]));
        return;
      }
    } catch(e) { /* 服务器未启动，降级 */ }
  }
  // 降级：从 localStorage 恢复
  try { _banSet = new Set(JSON.parse(localStorage.getItem(BAN_KEY)||'[]')); }
  catch { _banSet = new Set(); }
}

function addBan(ch) {
  if (!ch) return;
  _banSet.add(ch);
  _persistBan();
  renderBanList();
  applyFilter();
}

function removeBan(ch) {
  _banSet.delete(ch);
  _persistBan();
  renderBanList();
  applyFilter();
}

function clearBan() {
  if (!confirm('确认清空黑名单？')) return;
  _banSet.clear();
  _persistBan();
  renderBanList();
  applyFilter();
}

function addBanFromInput() {
  const inp = document.getElementById('banInput');
  const chars = [...inp.value.trim()].filter(c => /[\u4e00-\u9fff]/.test(c));
  chars.forEach(ch => _banSet.add(ch));
  if (chars.length) { _persistBan(); renderBanList(); applyFilter(); }
  inp.value = '';
  inp.focus();
}

function renderBanList() {
  const ban = loadBan();
  const listEl = document.getElementById('banList');
  const emptyEl = document.getElementById('banEmpty');
  const clearBtn = document.getElementById('clearBanBtn');
  const countEl = document.getElementById('banCountLabel');
  const saveHint = document.getElementById('banSaveHint');
  if (!ban.size) {
    listEl.innerHTML = '';
    listEl.appendChild(emptyEl);
    emptyEl.style.display = '';
    clearBtn.style.display = 'none';
    countEl.textContent = '';
    if (saveHint) saveHint.style.display = 'none';
    return;
  }
  emptyEl.style.display = 'none';
  clearBtn.style.display = '';
  countEl.textContent = `(${ban.size})`;
  if (saveHint) saveHint.style.display = USE_API ? 'none' : '';
  listEl.innerHTML = [...ban].map(ch =>
    `<span class="ban-tag">${esc(ch)}<button onclick="removeBan('${esc(ch)}')" title="移出黑名单">×</button></span>`
  ).join('');
  listEl.appendChild(emptyEl);
}

// ── 工具 ────────────────────────────────────────────
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function hlSent(sent, ch) {
  return [...sent].map(c => c===ch?`<span class="hl">${esc(c)}</span>`:esc(c)).join('');
}
function wxStyle(wx){ const [fg,bg]=WX_COLOR[wx]||['#888','#eee']; return `background:${bg};color:${fg}`; }

// 拼音去声调（āáǎà→a 等）
function stripTone(py) {
  return py.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/ü/g,'v');
}

// 检查字是否匹配搜索词
function matchQuery(char, q) {
  if (!q) return true;
  if (char.c === q) return true;
  const stripped = stripTone(char.py);
  const qq = q.toLowerCase().replace(/ü/g,'v');
  return char.py.toLowerCase().includes(qq) || stripped.includes(qq);
}

// ── 页面内容迭代器（惰性，跳过同字/姓氏）────────────
function getPageItems(pg) {
  const skip = (pg-1) * PAGE_SIZE;
  const items = [], surname = state.surname;
  const n1 = filtC1.length, n2 = filtC2.length;
  let cnt = 0;
  outer:
  for (let i=0;i<n1;i++){
    const a=filtC1[i];
    if (surname && a.c===surname) continue;
    for (let j=0;j<n2;j++){
      const b=filtC2[j];
      if (b.c===a.c || (surname && b.c===surname)) continue;
      if (cnt++ < skip) continue;
      items.push({a,b});
      if (items.length>=PAGE_SIZE) break outer;
    }
  }
  return items;
}

function estimateTotal() {
  const surname = state.surname;
  const n1 = filtC1.filter(a=>!surname||a.c!==surname).length;
  const n2 = filtC2.filter(b=>!surname||b.c!==surname).length;
  return n1 * n2;
}

// ── 渲染单卡 ────────────────────────────────────────
function renderCard(a, b, surname, favBtnVisible=true) {
  const [fg1,bg1]=WX_COLOR[a.wx]||['#888','#eee'];
  const [fg2,bg2]=WX_COLOR[b.wx]||['#888','#eee'];
  const sHTML = surname ? `<span class="name-surname">${esc(surname)}</span>` : '';
  const k = favKey(a,b);
  const faved = isFaved(a,b);

  const src = a.sent ? a : (b.sent ? b : null);
  const poemHTML = src
    ? `<div class="poem-block">
        <div class="poem-sent">「${hlSent(src.sent, src===a?a.c:b.c)}」</div>
        <div class="poem-meta">
          ${src.bookkey?`<span class="book-tag">${esc(BOOK_NAMES[src.bookkey]||src.bookkey)}</span>`:''}
          ${src.dynasty?`[${esc(src.dynasty)}]`:''} ${esc(src.author||'')}${src.title?` 《${esc(src.title)}》`:''}
        </div>
       </div>`
    : `<div class="poem-block"><span class="no-poem">暂无诗文来源</span></div>`;

  const openLabel = o => o==='large'?'大开口':'小开口';

  return `<div class="card">
    ${favBtnVisible?`<button class="fav-btn ${faved?'saved':''}" data-k="${esc(k)}"
      onclick="toggleFav(${JSON.stringify(a).replace(/"/g,'&quot;')},${JSON.stringify(b).replace(/"/g,'&quot;')},${JSON.stringify(surname||'').replace(/"/g,'&quot;')})"
      title="${faved?'移出收藏':'加入收藏'}">${faved?'♥':'♡'}</button>`:''}
    <div class="name-row">
      ${sHTML}<span class="name-chars">${esc(a.c)}${esc(b.c)}</span>
      <div class="name-py">${esc(a.py)}<br>${esc(b.py)}</div>
    </div>
    <div class="attrs">
      <div class="attr-card" style="background:${bg1}">
        <span class="attr-char" style="color:${fg1}">${esc(a.c)}</span>
        <div class="attr-detail">
          <span class="wx-badge" style="${wxStyle(a.wx)}">${esc(a.wx)}</span>
          <span class="tone-badge">${TONE_NAMES[a.tone]||a.tone}声</span>
          <span class="stroke-badge">${a.st}画</span>
          <span class="open-badge">${openLabel(a.open)}</span>
          <button class="ban-char-btn" onclick="addBan('${esc(a.c)}')" title="屏蔽「${esc(a.c)}」字">⊘ 屏蔽</button>
        </div>
      </div>
      <div class="attr-card" style="background:${bg2}">
        <span class="attr-char" style="color:${fg2}">${esc(b.c)}</span>
        <div class="attr-detail">
          <span class="wx-badge" style="${wxStyle(b.wx)}">${esc(b.wx)}</span>
          <span class="tone-badge">${TONE_NAMES[b.tone]||b.tone}声</span>
          <span class="stroke-badge">${b.st}画</span>
          <span class="open-badge">${openLabel(b.open)}</span>
          <button class="ban-char-btn" onclick="addBan('${esc(b.c)}')" title="屏蔽「${esc(b.c)}」字">⊘ 屏蔽</button>
        </div>
      </div>
    </div>
    ${poemHTML}
  </div>`;
}

// ── 字池面板 HTML ────────────────────────────────────
let poolOpen = false;

function buildPoolChip(c) {
  const [fg, bg] = WX_COLOR[c.wx] || ['#888','#eee'];
  return `<span class="pool-chip" style="border-color:${bg}">
    <span class="pool-chip-char" style="color:${fg}">${esc(c.c)}</span>
    <span class="pool-chip-py">${esc(c.py)}</span>
    <span style="display:flex;align-items:center;gap:2px;margin-top:1px">
      <span class="pool-chip-wx" style="background:${bg};color:${fg}">${esc(c.wx)}</span>
      <span class="pool-chip-st">${c.st}</span>
    </span>
  </span>`;
}

function buildPoolPanel() {
  const c1chips = filtC1.map(buildPoolChip).join('');
  const c2chips = filtC2.map(buildPoolChip).join('');
  return `
  <div class="pool-panel" id="poolPanel">
    <div class="pool-header" onclick="togglePool()">
      <span class="pool-toggle ${poolOpen?'open':''}">▸</span>
      <span class="pool-title">候选字池</span>
      <div class="pool-counts">
        <span class="pool-count-tag ze">名一仄声 ${filtC1.length} 字</span>
        <span class="pool-count-tag ping">名二平声 ${filtC2.length} 字</span>
      </div>
    </div>
    <div class="pool-body ${poolOpen?'open':''}">
      <div class="pool-cols">
        <div>
          <div class="pool-col-title">名一（${toneLabel(state.tone1)}）${filtC1.length} 字</div>
          <div class="pool-chips">${c1chips}</div>
        </div>
        <div>
          <div class="pool-col-title">名二（${toneLabel(state.tone2)}）${filtC2.length} 字</div>
          <div class="pool-chips">${c2chips}</div>
        </div>
      </div>
    </div>
  </div>`;
}

function togglePool() {
  poolOpen = !poolOpen;
  const panel = document.getElementById('poolPanel');
  if (!panel) return;
  panel.querySelector('.pool-toggle').classList.toggle('open', poolOpen);
  panel.querySelector('.pool-body').classList.toggle('open', poolOpen);
}

// ── 渲染主区 ────────────────────────────────────────
function renderPage() {
  const mainEl = document.getElementById('main');
  const total  = estimateTotal();
  const surname = state.surname;

  if (!filtC1.length || !filtC2.length || total===0) {
    mainEl.innerHTML=`<div class="empty"><div class="big">🔍</div>暂无符合条件的候选名<br>请调整筛选条件</div>`;
    return;
  }

  const totalPages = Math.max(1, Math.ceil(total/PAGE_SIZE));
  if (page > totalPages) page = totalPages;
  const items = getPageItems(page);
  const cards = items.map(({a,b})=>renderCard(a,b,surname)).join('');

  let paging='';
  if (totalPages>1) {
    const lo=Math.max(1,page-2), hi=Math.min(totalPages,page+2);
    paging=`<div class="pagination"><button class="page-btn" onclick="goPage(${page-1})" ${page<=1?'disabled':''}>‹</button>`;
    if(lo>1) paging+=`<button class="page-btn" onclick="goPage(1)">1</button>`;
    if(lo>2) paging+=`<span style="color:var(--ink3);padding:0 3px">…</span>`;
    for(let i=lo;i<=hi;i++) paging+=`<button class="page-btn ${i===page?'active':''}" onclick="goPage(${i})">${i}</button>`;
    if(hi<totalPages-1) paging+=`<span style="color:var(--ink3);padding:0 3px">…</span>`;
    if(hi<totalPages) paging+=`<button class="page-btn" onclick="goPage(${totalPages})">${totalPages}</button>`;
    paging+=`<button class="page-btn" onclick="goPage(${page+1})" ${page>=totalPages?'disabled':''}>›</button></div>`;
  }

  mainEl.innerHTML=`
    <div class="combo-bar">
      <span class="combo-tag ze">名一${toneLabel(state.tone1)} ${filtC1.length.toLocaleString()} 字</span>
      <span style="color:var(--ink3);font-size:13px">×</span>
      <span class="combo-tag ping">名二${toneLabel(state.tone2)} ${filtC2.length.toLocaleString()} 字</span>
      <span style="color:var(--ink3);font-size:13px">=</span>
      <div class="combo-count">约 <strong>${total.toLocaleString()}</strong> 种组合</div>
    </div>
    ${buildPoolPanel()}
    <div class="toolbar">
      <span class="result-info">第 <strong>${page}</strong> / ${totalPages.toLocaleString()} 页，每页 ${PAGE_SIZE} 条</span>
    </div>
    <div class="grid">${cards}</div>
    ${paging}`;
}

// ── 渲染收藏夹 ──────────────────────────────────────
function renderFavorites() {
  const mainEl = document.getElementById('main');
  const favs = loadFavs();
  if (!favs.length) {
    mainEl.innerHTML=`<div class="empty"><div class="big">♡</div>收藏夹还是空的<br>在浏览时点击卡片右上角的 ♡ 即可收藏</div>`;
    return;
  }
  const cards = favs.slice().reverse().map(f =>
    renderCard(f.a, f.b, f.surname||state.surname, true)
  ).join('');
  mainEl.innerHTML=`
    <div class="fav-header">
      <span class="fav-title">已收藏 ${favs.length} 个名字</span>
      <button class="clear-fav-btn" onclick="clearFavs()">清空收藏夹</button>
    </div>
    <div class="grid">${cards}</div>`;
}

function clearFavs() {
  if (!confirm('确认清空全部收藏？')) return;
  saveFavs([]);
  updateFavCount();
  renderFavorites();
}

function goPage(p) {
  if(p<1) return;
  page=p;
  renderPage();
  document.getElementById('main').scrollTo(0,0);
}

// ── tab 切换 ─────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabBrowse').classList.toggle('active', tab==='browse');
  document.getElementById('tabFav').classList.toggle('active', tab==='fav');
  document.getElementById('sidebar').style.display = tab==='browse' ? '' : 'none';
  if (tab==='browse') renderPage(); else renderFavorites();
}

// ── 过滤 ────────────────────────────────────────────
function sortPool(pool) {
  const s = state.sort;
  if (s==='st_asc')  return [...pool].sort((a,b)=>a.st-b.st);
  if (s==='st_desc') return [...pool].sort((a,b)=>b.st-a.st);
  if (s==='wx')      return [...pool].sort((a,b)=>a.wx.localeCompare(b.wx)||a.st-b.st);
  return [...pool].sort((a,b)=>a.st-b.st);
}

function toneMatch(c, toneSet) {
  return toneSet.has(String(c.tone));
}

function toneLabel(toneSet) {
  const all = ['1','2','3','4'];
  const active = all.filter(t => toneSet.has(t));
  if (active.length === 4) return '四声皆可';
  if (active.length === 0) return '—';
  // 合并连续声调为区间描述
  const hasPing = active.includes('1') || active.includes('2');
  const hasZe   = active.includes('3') || active.includes('4');
  if (hasPing && hasZe) return active.map(t=>t+'声').join('/');
  if (hasPing) return active.length===2 ? '平声' : active.map(t=>t+'声').join('/');
  if (hasZe)  return active.length===2 ? '仄声' : active.map(t=>t+'声').join('/');
  return active.map(t=>t+'声').join('/');
}

function applyFilter() {
  const {tone1,tone2,wx1,wx2,open1,open2,st1Min,st1Max,st2Min,st2Max,srcFilter,q1,q2} = state;
  const needPoem = srcFilter==='poem';
  const ban = loadBan();

  filtC1 = sortPool(allChars.filter(c =>
    toneMatch(c,tone1) && wx1.has(c.wx) && open1.has(c.open) &&
    c.st>=st1Min && c.st<=st1Max &&
    (!needPoem||!!c.sent) && matchQuery(c,q1) && !ban.has(c.c)
  ));
  filtC2 = sortPool(allChars.filter(c =>
    toneMatch(c,tone2) && wx2.has(c.wx) && open2.has(c.open) &&
    c.st>=st2Min && c.st<=st2Max &&
    (!needPoem||!!c.sent) && matchQuery(c,q2) && !ban.has(c.c)
  ));

  page=1;
  if (currentTab==='browse') renderPage();

  const tot = estimateTotal();
  document.getElementById('totalPill').textContent = `${tot.toLocaleString()} 种组合`;
}

// ── 控件绑定 ─────────────────────────────────────────
let debTimer;
const debounce = fn => { clearTimeout(debTimer); debTimer=setTimeout(fn,200); };

document.getElementById('surnameInput').addEventListener('input', e=>{
  state.surname=e.target.value.trim(); debounce(applyFilter);
});
document.getElementById('q1Input').addEventListener('input', e=>{
  state.q1=e.target.value.trim(); debounce(applyFilter);
});
document.getElementById('q2Input').addEventListener('input', e=>{
  state.q2=e.target.value.trim(); debounce(applyFilter);
});

function bindChips(groupId, stateSet, attr) {
  document.getElementById(groupId).addEventListener('click', e=>{
    const chip=e.target.closest('.chip'); if(!chip) return;
    const val = chip.dataset[attr];
    if(stateSet.has(val)){
      if(stateSet.size<=1) return;
      stateSet.delete(val); chip.classList.remove('active');
    } else { stateSet.add(val); chip.classList.add('active'); }
    debounce(applyFilter);
  });
}
bindChips('tone1Group', state.tone1, 'tone');
bindChips('tone2Group', state.tone2, 'tone');
bindChips('wx1Group', state.wx1, 'wx');
bindChips('wx2Group', state.wx2, 'wx');
bindChips('open1Group', state.open1, 'op');
bindChips('open2Group', state.open2, 'op');

function bindRange(id,lblId,key){
  const el=document.getElementById(id), lbl=document.getElementById(lblId);
  el.addEventListener('input',()=>{ lbl.textContent=el.value; state[key]=+el.value; debounce(applyFilter); });
}
bindRange('st1Min','st1MinVal','st1Min'); bindRange('st1Max','st1MaxVal','st1Max');
bindRange('st2Min','st2MinVal','st2Min'); bindRange('st2Max','st2MaxVal','st2Max');

document.querySelectorAll('input[name=srcFilter]').forEach(r=>
  r.addEventListener('change',()=>{ state.srcFilter=r.value; debounce(applyFilter); })
);
document.getElementById('sortSel').addEventListener('change', e=>{
  state.sort=e.target.value; debounce(applyFilter);
});

document.getElementById('resetBtn').addEventListener('click',()=>{
  state.surname=''; state.q1=''; state.q2='';
  state.tone1=new Set(['3','4']); state.tone2=new Set(['1','2']);
  state.wx1=new Set(['金','木','火','水','土']);
  state.wx2=new Set(['金','木','火','水','土']);
  state.open1=new Set(['large','small']);
  state.open2=new Set(['large','small']);
  state.st1Min=1; state.st1Max=25; state.st2Min=1; state.st2Max=25;
  state.srcFilter='all'; state.sort='default';
  // 重置平仄 chip 视觉状态
  document.querySelectorAll('#tone1Group .chip').forEach(c=>c.classList.toggle('active',c.dataset.tone==='3'||c.dataset.tone==='4'));
  document.querySelectorAll('#tone2Group .chip').forEach(c=>c.classList.toggle('active',c.dataset.tone==='1'||c.dataset.tone==='2'));
  document.getElementById('surnameInput').value='';
  document.getElementById('q1Input').value='';
  document.getElementById('q2Input').value='';
  ['st1Min','st1Max','st2Min','st2Max'].forEach(id=>{
    const el=document.getElementById(id); el.value=id.includes('Min')?1:25;
    document.getElementById(id+'Val').textContent=el.value;
  });
  document.querySelectorAll('.chip').forEach(c=>c.classList.add('active'));
  document.querySelector('input[name=srcFilter][value=all]').checked=true;
  document.getElementById('sortSel').value='default';
  applyFilter();
});

// ── 加载 ─────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch(DATA_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    allChars = await res.json();
    const ze=allChars.filter(c=>c.tone>=3).length, ping=allChars.filter(c=>c.tone<=2).length;
    document.getElementById('totalPill').textContent=`全库 ${allChars.length.toLocaleString()} 字`;
    document.getElementById('loading').remove();
    updateFavCount();
    await initBan();
    renderBanList();
    // 黑名单输入框支持回车
    document.getElementById('banInput').addEventListener('keydown', e=>{
      if (e.key==='Enter') addBanFromInput();
    });
    applyFilter();
  } catch(err) {
    document.getElementById('loading').innerHTML=
      `<div style="color:#B84A3A;text-align:center;padding:40px">
        加载失败：${esc(err.message)}<br><br>
        请通过本地服务器访问：<br>
        <code style="font-size:12px;background:#eee;padding:4px 8px;border-radius:4px;display:inline-block;margin-top:8px">
          python3 -m http.server 8080
        </code>
      </div>`;
  }
}

init();
</script>
